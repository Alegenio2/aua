name: Fetch Age of Empires Feed

on:
  schedule:
    - cron: '0 12 * * *'  # Ejecuta una vez al día a las 9:00 AM (Uruguay)
  workflow_dispatch:

permissions:
  contents: write  # 👈 DA PERMISO DE ESCRITURA AL TOKEN

jobs:
  fetch_feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # 👈 Usa el token con permisos de escritura

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Age of Empires Feed
        run: |
          curl -s https://www.ageofempires.com/feed/ -o feed.xml
          node fetch-feed.js  # Tu script genera feed.json

      - name: Commit feed data
        run: |
          git config user.email "alegenio2@gmail.com"
          git config user.name "Alegenio2"
          git add feed.json
          git diff --quiet && echo "No changes to commit" || (
            git commit -m "Update feed data" &&
            git push origin HEAD:${{ github.ref }}
          )

