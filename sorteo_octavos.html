<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sorteo Octavos | Copa Uruguaya 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e6;
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-family: 'Cinzel', serif;
      color: #d4a843;
      font-size: 32px;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(212, 168, 67, 0.3);
    }

    .bombos-wrapper {
      display: flex;
      gap: 30px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 1000px;
    }

    .bombo-box {
      flex: 1;
      background: rgba(20, 20, 30, 0.6);
      border: 1px solid rgba(212, 168, 67, 0.15);
      border-radius: 8px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .bombo-box h2 {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: #d4a843;
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(212, 168, 67, 0.2);
      padding-bottom: 10px;
    }

    .player-tag {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 10px 15px;
      margin-bottom: 8px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .player-tag.used {
      opacity: 0.15;
      transform: scale(0.9);
      filter: grayscale(1);
    }

    .btn-revelar {
      background: linear-gradient(135deg, #d4a843 0%, #a67c2d 100%);
      color: #0a0a0a;
      border: none;
      padding: 16px 45px;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 40px;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .btn-revelar:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 25px rgba(212, 168, 67, 0.3);
    }

    .btn-revelar:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .bracket-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      width: 100%;
      max-width: 1100px;
    }

    .matchup-card {
      background: linear-gradient(180deg, rgba(30, 30, 45, 0.8) 0%, rgba(15, 15, 25, 0.9) 100%);
      border: 1px solid rgba(212, 168, 67, 0.2);
      padding: 20px;
      border-radius: 6px;
      animation: matchAppear 0.6s ease-out forwards;
      text-align: center;
    }

    @keyframes matchAppear {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .matchup-card .llave { font-size: 11px; color: #d4a843; letter-spacing: 2px; margin-bottom: 15px; }
    .matchup-card .p-name { font-size: 19px; font-weight: 700; color: #fff; }
    .matchup-card .vs { font-family: 'Cinzel', serif; color: #d4a843; margin: 10px 0; font-size: 14px; }

  </style>
</head>
<body>

  <div class="header">
    <h1>Copa Uruguaya 2026</h1>
    <p style="color: #888; margin-top: 10px; letter-spacing: 2px;">SORTEO DE OCTAVOS DE FINAL</p>
  </div>

  <div class="bombos-wrapper">
    <div class="bombo-box">
      <h2>Bombo 1 (Cabezas de Serie)</h2>
      <div id="bombo1-list"></div>
    </div>
    <div class="bombo-box">
      <h2>Bombo 2 (Clasificados)</h2>
      <div id="bombo2-list"></div>
    </div>
  </div>

  <button class="btn-revelar" id="btnMain" onclick="revelarSiguiente()">Revelar Cruce</button>

  <div class="bracket-grid" id="bracket"></div>

  <script>
    let cruces = [];
    let actual = 0;

    async function init() {
      try {
        // Buscamos en la carpeta torneos como me indicaste
        const resp = await fetch('torneos/1v1_copa_uruguaya_2026.json');
        const data = await resp.json();
        
        cruces = data.eliminatorias.octavos;

        const b1 = document.getElementById('bombo1-list');
        const b2 = document.getElementById('bombo2-list');

        // Llenamos los bombos basándonos en los octavos ya definidos
        cruces.forEach(m => {
          b1.innerHTML += `<div class="player-tag" id="p1-${m.jugador1Id}">${m.jugador1Nick}</div>`;
          b2.innerHTML += `<div class="player-tag" id="p2-${m.jugador2Id}">${m.jugador2Nick}</div>`;
        });

      } catch (e) {
        console.error(e);
        document.querySelector('.header').innerHTML += "<p style='color:red'>Error cargando JSON</p>";
      }
    }

    function revelarSiguiente() {
      if (actual >= cruces.length) return;

      const m = cruces[actual];

      // Marcamos como usados en los bombos
      document.getElementById(`p1-${m.jugador1Id}`).classList.add('used');
      document.getElementById(`p2-${m.jugador2Id}`).classList.add('used');

      // Añadimos la tarjeta al bracket con el estilo premium
      const bracket = document.getElementById('bracket');
      bracket.innerHTML += `
        <div class="matchup-card">
          <div class="llave">OCTAVOS DE FINAL - ${m.partidoId}</div>
          <div class="p-name">${m.jugador1Nick}</div>
          <div class="vs">VS</div>
          <div class="p-name">${m.jugador2Nick}</div>
        </div>
      `;

      actual++;
      if (actual === cruces.length) {
        const btn = document.getElementById('btnMain');
        btn.innerText = "SORTEO FINALIZADO";
        btn.disabled = true;
      }
    }

    init();
  </script>
</body>
</html>
