<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copa Uruguaya 2026 - Estadísticas | AUA</title>
    <meta name="description" content="Estadísticas de civs, mapas y jugadores de la Copa Uruguaya 2026.">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="img/favicon-32x32.png" type="image/png" />

    <style>
        /* ── Variables compartidas con tu web ── */
        :root {
            --gold:    #e8c87a;
            --gold2:   #c8a040;
            --brown:   #3a2a1a;
            --bg0:     #0d0d0d;
            --bg1:     #131008;
            --bg2:     #1a1208;
            --bg3:     #22180a;
            --text:    #e8e0d0;
            --muted:   #a09070;
            --dim:     #665544;
            --win:     #a8c860;
            --loss:    #c87060;
            --border:  rgba(232,200,122,0.15);
        }

        /* ── Página ── */
        body { background: var(--bg0); color: var(--text); }

        .stats-hero {
            background: linear-gradient(180deg, #1a0a00 0%, var(--bg0) 100%);
            border-bottom: 1px solid var(--brown);
            padding: 28px 20px 20px;
            text-align: center;
        }
        .stats-hero h2 {
            font-family: 'Cinzel', serif;
            font-size: clamp(18px, 4vw, 26px);
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 4px;
        }
        .stats-hero .hero-sub { font-size: 13px; color: var(--muted); }
        .stats-hero .hero-meta { font-size: 11px; color: var(--dim); margin-top: 6px; }

        /* ── Tabs ── */
        .s-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--brown);
            background: #111108;
            padding: 0 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .s-tabs::-webkit-scrollbar { display: none; }
        .s-tab {
            padding: 11px 18px;
            font-size: 13px;
            font-family: 'Open Sans', sans-serif;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: color 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .s-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
        .s-tab:hover { color: var(--gold); }

        /* ── Secciones ── */
        .s-section { display: none; padding: 20px 16px; max-width: 1100px; margin: 0 auto; }
        .s-section.active { display: block; }

        /* ── Métricas ── */
        .metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .metric {
            background: var(--bg2);
            border: 0.5px solid var(--brown);
            border-radius: 8px;
            padding: 13px 14px;
        }
        .metric-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .metric-value { font-size: 22px; font-weight: 700; color: var(--gold); font-family: 'Cinzel', serif; }
        .metric-sub   { font-size: 11px; color: var(--dim); margin-top: 2px; }

        /* ── Cards ── */
        .s-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .s-card {
            background: var(--bg2);
            border: 0.5px solid var(--brown);
            border-radius: 10px;
            padding: 16px;
        }
        .s-card-title {
            font-size: 10px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 0.5px solid var(--brown);
        }

        /* ── Filas de civ ── */
        .civ-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 9px;
        }
        .civ-img {
            width: 26px; height: 26px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--bg3);
            flex-shrink: 0;
        }
        .civ-name { font-size: 13px; color: var(--text); min-width: 100px; }
        .bar-wrap { flex: 1; background: var(--bg0); border-radius: 3px; height: 5px; }
        .bar-fill { height: 5px; border-radius: 3px; }
        .bar-win  { background: var(--win); }
        .bar-loss { background: var(--loss); }
        .bar-mid  { background: var(--gold2); }
        .civ-wr   { font-size: 12px; min-width: 42px; text-align: right; }
        .civ-games{ font-size: 11px; color: var(--dim); min-width: 26px; text-align: right; }

        /* ── Jugadores ── */
        .player-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .player-avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--bg3);
            border: 1px solid var(--gold2);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 700;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            flex-shrink: 0;
        }
        .player-name   { font-size: 14px; font-weight: 700; color: var(--gold); }
        .player-record { font-size: 12px; color: var(--muted); margin-top: 2px; }

        /* ── Partidas ── */
        .match-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 0.5px solid var(--bg3);
            font-size: 12px;
        }
        .match-row:last-child { border-bottom: none; }
        .match-map { min-width: 110px; color: var(--muted); font-size: 11px; }
        .match-p   { flex: 1; }
        .match-score { color: var(--gold); font-weight: 700; min-width: 38px; text-align: center; font-family: 'Cinzel', serif; }
        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 11px;
            border: 0.5px solid;
        }
        .badge-win  { background: #1a2208; border-color: #6a8040; color: var(--win); }
        .badge-loss { background: #220d08; border-color: #6a3020; color: var(--loss); }

        /* ── Ranking civs ── */
        .rank-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 0.5px solid var(--bg3);
        }
        .rank-row:last-child { border-bottom: none; }
        .rank-num { font-size: 15px; font-weight: 700; font-family: 'Cinzel', serif; min-width: 24px; text-align: center; }
        .rank-1 { color: var(--gold); }
        .rank-2 { color: #a0a0a0; }
        .rank-3 { color: #c87a40; }
        .rank-n { color: var(--brown); }
        .rank-bar { height: 3px; border-radius: 2px; margin-top: 3px; }

        /* ── Mapas civ ganadoras ── */
        .map-civ-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
        .map-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            background: var(--bg3);
            border: 0.5px solid var(--brown);
            color: var(--gold2);
        }

        /* ── Filter buttons ── */
        .filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
        .f-btn {
            padding: 5px 13px;
            font-size: 12px;
            background: var(--bg2);
            border: 0.5px solid var(--brown);
            border-radius: 20px;
            color: var(--muted);
            cursor: pointer;
            font-family: 'Open Sans', sans-serif;
            transition: all 0.2s;
        }
        .f-btn.active { background: var(--bg3); border-color: var(--gold2); color: var(--gold); }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .metrics { grid-template-columns: 1fr 1fr; }
            .s-grid-2 { grid-template-columns: 1fr; }
            .match-p { display: none; }
        }
    </style>
</head>

    // ── Estado ────────────────────────────────────────────────────────────────
    let DATA        = DEMO;

    // ── Helpers ───────────────────────────────────────────────────────────────
    const civImg = c => `https://backend.cdn.aoe2companion.com/public/aoe2/de/civilizations/${c.toLowerCase().replace(/ /g,'_')}.png`;
    const wrColor = w => w >= 60 ? '#a8c860' : w >= 40 ? '#e8c87a' : '#c87060';
    const initials = n => n.replace(/[|\[\]]/g,'').trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('es-UY',{day:'2-digit',month:'2-digit'}) : '';
    const fmtTime = iso => iso ? new Date(iso).toLocaleString('es-UY') : '—';
    function destroyChart(id) { if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

    function civRow(civ, pj, wr) {
        const w = Math.min(wr, 100);
        const cls = wr >= 60 ? 'bar-win' : wr >= 40 ? 'bar-mid' : 'bar-loss';
        return `

        document.getElementById('tab-' + name).classList.add('active');
        if (btn) btn.classList.add('active');
        renders[name]();
    }

    // ── RENDER RESUMEN ────────────────────────────────────────────────────────
    function renderResumen() {
        const d = DATA;
        const mapCount = Object.keys(d.mapas).length;
        const civEntries = Object.entries(d.civs).sort((a,b)=>b[1].total_jugadas-a[1].total_jugadas);
        //const topCiv = Object.entries(d.civs).sort((a,b)=>b[1].winrate-a[1].winrate).find(([,v])=>v.total_jugadas>=2) ?? civEntries[0];
        // 1. Ordenamos por Winrate (desc), luego por Victorias (desc) y luego por jugadas (desc)
const sortedByPerformance = Object.entries(d.civs).sort((a, b) => {
    if (b[1].winrate !== a[1].winrate) return b[1].winrate - a[1].winrate;
    if (b[1].total_ganadas !== a[1].total_ganadas) return b[1].total_ganadas - a[1].total_ganadas;
    return b[1].total_jugadas - a[1].total_jugadas;
});

// 2. Intentamos buscar una con al menos 2 partidas, si no hay, agarramos la mejor que tenga al menos 1 victoria
let topCiv = sortedByPerformance.find(([, v]) => v.total_jugadas >= 2 && v.total_ganadas > 0);

if (!topCiv) {
    topCiv = sortedByPerformance.find(([, v]) => v.total_ganadas > 0);
}

const civReyName = topCiv ? topCiv[0] : "—";
const civReyWR = topCiv ? topCiv[1].winrate : 0;

`;

            <div class="s-card-title">Civs más elegidas</div>
            <div id="leg-games" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:11px;color:var(--muted)"></div>
            <div style="position:relative;height:210px"><canvas id="ch-games"></canvas></div>
          </div>
        `;

        setTimeout(() => {
            document.getElementById('leg-wr').innerHTML    = labels.map((l,i)=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:${barColors[i]}"></span>${l}</span>`).join('');
            document.getElementById('leg-games').innerHTML = labels.map((l,i)=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:${barColors[i]}"></span>${l}</span>`).join('');

            const opts = (cb) => ({
                responsive:true, maintainAspectRatio:false,
                plugins:{ legend:{display:false} },
                scales:{
                    y:{ ticks:{color:'#665544',font:{size:10},...(cb||{})}, grid:{color:'#1a1208'} },
                    x:{ ticks:{color:'#806040',font:{size:10}}, grid:{display:false} }
                }
            });

            charts['ch-wr'] = new Chart(document.getElementById('ch-wr'), {
                type:'bar',
                data:{ labels, datasets:[{ data:wrData, backgroundColor:barColors, borderRadius:3 }] },
                options: opts({ callback: v => v+'%', max:100 })
            });
            charts['ch-games'] = new Chart(document.getElementById('ch-games'), {
                type:'bar',
                data:{ labels, datasets:[{ data:gamesData, backgroundColor:barColors, borderRadius:3 }] },
                options: opts({ stepSize:1 })
            });
        }, 30);
    }

    // ── RENDER JUGADORES ─────────────────────────────────────────────────────
    function renderJugadores() {
        const players = Object.entries(DATA.jugadores);
        document.getElementById('jugadores-box').innerHTML = players.map(([, j]) => {
            const topCivs = Object.entries(j.civs).sort((a,b) => b[1].pj - a[1].pj).slice(0, 5);
            const topMaps = Object.entries(j.mapas).sort((a,b) => b[1].pj - a[1].pj).slice(0, 4);
            return `
              <div class="s-card">
                <div class="player-header">
                  <div class="player-avatar">${initials(j.nick)}</div>
                  <div>
                    <div class="player-name">${j.nick.replace(/[|\[\]]/g,'').trim()}</div>
                    <div class="player-record">${j.global.pg}V - ${j.global.pp}D &nbsp;·&nbsp; <span style="color:${wrColor(j.global.winrate)}">${j.global.winrate}% WR</span></div>
                  </div>
                </div>
                <div class="s-card-title">Civs jugadas</div>
                ${topCivs.map(([civ, d]) => civRow(civ, d.pj, d.winrate)).join('')}
                <div class="s-card-title" style="margin-top:14px">Mapas</div>
                ${topMaps.map(([mapa, d]) => `
                  <div class="civ-row">
                    <div class="civ-name">${mapa}</div>
                    <div class="bar-wrap"><div class="bar-fill ${d.winrate>=60?'bar-win':d.winrate>=40?'bar-mid':'bar-loss'}" style="width:${d.winrate}%"></div></div>
                    <div class="civ-wr" style="color:${wrColor(d.winrate)}">${d.winrate}%</div>
                    <div class="civ-games">${d.pj}g</div>
                  </div>`).join('')}
              </div>`;
        }).join('');
    }

    // ── RENDER CIVS ──────────────────────────────────────────────────────────
    function renderCivs() {
        if (!document.getElementById('civ-filters').children.length) {
            document.getElementById('civ-filters').innerHTML = `
              <button class="f-btn active"  onclick="setCivFilter('jugadas',this)">Más jugadas</button>
              <button class="f-btn"         onclick="setCivFilter('winrate',this)">Mayor WR</button>
              <button class="f-btn"         onclick="setCivFilter('victorias',this)">Más victorias</button>
            `;
        }

        let sorted = Object.entries(DATA.civs);
        if (civFilter === 'winrate')    sorted.sort((a,b) => b[1].winrate - a[1].winrate);
        else if (civFilter === 'victorias') sorted.sort((a,b) => b[1].total_ganadas - a[1].total_ganadas);
        else sorted.sort((a,b) => b[1].total_jugadas - a[1].total_jugadas);

        const rankRows = sorted.slice(0, 10).map(([civ, d], i) => `
          <div class="rank-row">
            <div class="rank-num ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n'}">${i+1}</div>
            <img src="${civImg(civ)}" style="width:28px;height:28px;border-radius:4px;object-fit:cover" onerror="this.style.display='none'" alt="${civ}" />
            <div style="flex:1">
              <div style="font-size:13px;color:var(--text)">${civ}</div>
              <div class="rank-bar" style="width:${d.winrate}%;background:${wrColor(d.winrate)}"></div>
            </div>
            <div style="text-align:right">
              <div style="font-size:12px;color:${wrColor(d.winrate)}">${d.winrate}%</div>
              <div style="font-size:10px;color:var(--dim)">${d.total_jugadas} partidas</div>
            </div>
          </div>`).join('');

        const vsRows = sorted.filter(([,d])=>Object.keys(d.vs_civs).length>0).slice(0,8).flatMap(([civ,d]) =>
            Object.entries(d.vs_civs).slice(0,2).map(([rival, vs]) => {
                const pA = Math.round((vs.ganadas/vs.jugadas)*100);
                return `
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px">
                    <div style="text-align:right;min-width:90px;color:${wrColor(pA)}">${civ}</div>
                    <div style="flex:1;height:5px;border-radius:3px;background:var(--bg0);overflow:hidden">
                      <div style="height:5px;background:#5a8030;float:left;width:${pA}%;border-radius:3px 0 0 3px"></div>
                      <div style="height:5px;background:#7a3020;float:right;width:${100-pA}%;border-radius:0 3px 3px 0"></div>
                    </div>
                    <div style="min-width:90px;color:${wrColor(100-pA)}">${rival}</div>
                    <div style="font-size:10px;color:var(--dim);min-width:44px;text-align:right">${pA}-${100-pA}%</div>
                  </div>`;
            })
        ).join('');

        document.getElementById('civs-box').innerHTML = `
          <div class="s-card">
            <div class="s-card-title">Ranking de civs</div>
            ${rankRows}
          </div>
          <div class="s-card">
            <div class="s-card-title">Matchups civ vs civ</div>
            ${vsRows || '<div style="color:var(--dim);font-size:12px">Más datos disponibles al avanzar el torneo</div>'}
          </div>
        `;
    }

    function setCivFilter(f, btn) {
        civFilter = f;
        document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderCivs();
    }

    // ── RENDER MAPAS ─────────────────────────────────────────────────────────
    function renderMapas() {
        const mapEntries = Object.entries(DATA.mapas).sort((a,b) => b[1].total_partidas - a[1].total_partidas);
        const labels = mapEntries.map(([m]) => m);
        const counts = mapEntries.map(([,d]) => d.total_partidas);
        const colors = ['#5a6830','#3a5820','#8a7020','#6a4820','#5a3820','#8a3020'];

        destroyChart('ch-mapas');

        const civCards = mapEntries.map(([mapa, d]) => {
            const topG = Object.entries(d.civs_ganadoras).sort((a,b)=>b[1]-a[1]).slice(0,3);
            const topP = Object.entries(d.civs_perdedoras).sort((a,b)=>b[1]-a[1]).slice(0,3);
            return `
              <div style="padding:10px 0;border-bottom:0.5px solid var(--bg3)">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                  <div style="font-size:13px;color:var(--text);font-weight:700">${mapa}</div>
                  <div style="font-size:10px;color:var(--dim)">${d.total_partidas} partida${d.total_partidas>1?'s':''}</div>
                </div>
                <div style="font-size:10px;color:var(--dim);margin-bottom:3px">Civs ganadoras:</div>
                <div class="map-civ-tags">${topG.map(([c,n])=>`<span class="map-tag" style="border-color:#5a8030;color:var(--win)">${c} ×${n}</span>`).join('')}</div>
              </div>`;
        }).join('');

        document.getElementById('mapas-box').innerHTML = `
          <div class="s-card">
            <div class="s-card-title">Partidas por mapa</div>
            <div id="leg-mapas" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:11px;color:var(--muted)"></div>
            <div style="position:relative;height:${Math.max(labels.length*44+60,180)}px"><canvas id="ch-mapas"></canvas></div>
          </div>
          <div class="s-card">
            <div class="s-card-title">Civs ganadoras por mapa</div>
            ${civCards}
          </div>
        `;

        setTimeout(() => {
            document.getElementById('leg-mapas').innerHTML = labels.map((l,i)=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:${colors[i%colors.length]}"></span>${l}</span>`).join('');
            charts['ch-mapas'] = new Chart(document.getElementById('ch-mapas'), {
                type:'bar',
                data:{ labels, datasets:[{ data:counts, backgroundColor:colors.slice(0,labels.length), borderRadius:3 }] },
                options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
                    plugins:{legend:{display:false}},
                    scales:{
                        x:{ ticks:{color:'#665544',font:{size:10},stepSize:1}, grid:{color:'#1a1208'} },
                        y:{ ticks:{color:'#806040',font:{size:11}}, grid:{display:false} }
                    }
                }
            });
        }, 30);
    }

    // ── RENDER PARTIDAS ──────────────────────────────────────────────────────
    function renderPartidas() {
        const partidas = [...DATA.partidas].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
        const rows = partidas.map(p => `
          <div class="match-row">
            <div class="match-map">
              ${p.mapa}<br>
              <span style="color:var(--dim)">G${p.grupo}·R${p.ronda}${p.duracion?' · '+p.duracion+'min':''}</span>
            </div>
            <div class="match-p" style="text-align:right">
              <div style="font-size:11px;color:var(--muted);margin-bottom:3px">${p.jugador1.nick}</div>
              <span class="badge ${p.jugador1.gano?'badge-win':'badge-loss'}">${p.jugador1.gano?'W':'L'} ${p.jugador1.civ}</span>
            </div>
            <div class="match-score">${p.jugador1.gano?'1':'0'}-${p.jugador2.gano?'1':'0'}</div>
            <div class="match-p">
              <div style="font-size:11px;color:var(--muted);margin-bottom:3px">${p.jugador2.nick}</div>
              <span class="badge ${p.jugador2.gano?'badge-win':'badge-loss'}">${p.jugador2.gano?'W':'L'} ${p.jugador2.civ}</span>
            </div>
            <div style="font-size:10px;color:var(--dim);min-width:40px;text-align:right">${fmtDate(p.fecha)}</div>
          </div>`).join('');

        document.getElementById('partidas-box').innerHTML = `
          <div class="s-card-title">Historial de partidas (${partidas.length})</div>
          ${rows}
        `;
    }

    const renders = { resumen:renderResumen, jugadores:renderJugadores, civs:renderCivs, mapas:renderMapas, partidas:renderPartidas };

    // ── Cargar JSON real ──────────────────────────────────────────────────────
    async function loadData() {
        try {
            const res = await fetch(STATS_URL + '?t=' + Date.now());
            if (res.ok) {
                DATA = await res.json();
                document.getElementById('last-update').textContent =
                    'Actualizado: ' + fmtTime(DATA.meta?.ultima_actualizacion) + ' · ' + DATA.meta?.total_partidas + ' partidas';
            } else {
                document.getElementById('last-update').textContent = 'Datos de demo — el torneo aún no comenzó';
            }
        } catch {
            document.getElementById('last-update').textContent = 'Datos de demo — el torneo aún no comenzó';
        }
        renderResumen();
    }

    // ── Hamburger (usa el mismo main.js que el resto de tu web) ──────────────
    document.getElementById('hamburger').addEventListener('click', () => {
        document.getElementById('main-nav').classList.toggle('open');
    });

    loadData();
    </script>
</body>
</html>
