name: Fetch Age of Empires Feed

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch_feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Fetch and Process Feed
        run: |
          curl -s https://www.ageofempires.com/feed/ -o feed.xml
          node fetch-feed.js

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "alegenio2@gmail.com"
          git add feed.json
          # Solo hace commit si el archivo feed.json realmente cambió
          if ! git diff --cached --quiet; then
            git commit -m "Update feed data"
            git push
          else
            echo "No hay cambios en el feed para actualizar."
          fi
