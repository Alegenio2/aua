name: Fetch Age of Empires Feed

on:
  schedule:
    - cron: '0 12 * * *'  # Ejecuta una vez al día a las 9:00 AM (Uruguay)
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write  # Permite hacer push al mismo repo

jobs:
  fetch_feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Age of Empires Feed
        run: |
          curl -s https://www.ageofempires.com/feed/ -o feed.xml
          node fetch-feed.js  # este script debe generar feed.json

      - name: Commit feed data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "alegenio2@gmail.com"
          git config user.name "GitHub Actions"
          git add feed.json
          git diff --quiet && echo "No changes to commit" || (
            git commit -m "Update feed data" &&
            git push origin HEAD:${{ github.ref }}
          )
