<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Control Overlay — Copa Uruguaya 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e0d8c8;font-family:'Inter',sans-serif;min-height:100vh;padding:24px 16px}
h1{font-family:'Cinzel',serif;color:#e8c87a;font-size:18px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.subtitle{font-size:12px;color:#665544;margin-bottom:28px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:960px;margin:0 auto}
.full{grid-column:1/-1}
.panel{background:#131008;border:0.5px solid #3a2a1a;border-radius:10px;padding:18px}
.panel-title{font-size:10px;color:#806040;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;padding-bottom:8px;border-bottom:0.5px solid #2a1a0a}
label{display:block;font-size:11px;color:#806040;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;margin-top:12px}
label:first-of-type{margin-top:0}
input,select{width:100%;background:#0d0d0d;border:0.5px solid #3a2a1a;border-radius:6px;padding:8px 10px;color:#e0d8c8;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
input:focus,select:focus{border-color:#e8c87a}
input::placeholder{color:#2a1a0a}
.btn{width:100%;padding:10px;border-radius:7px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.18s;border:none;margin-top:8px}
.btn-gold{background:#e8c87a;color:#0a0a0a}
.btn-gold:hover{background:#f0d48a}
.btn-outline{background:transparent;border:0.5px solid #3a2a1a;color:#a09070}
.btn-outline:hover{border-color:#e8c87a;color:#e8c87a}
.btn-danger{background:#5a1010;color:#f0a0a0;border:0.5px solid #7a2020}
.btn-danger:hover{background:#7a1818}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:6px}
.dot-on {background:#a8c860;box-shadow:0 0 8px #a8c86060}
.dot-off{background:#3a2a1a}
.status-text{font-size:12px;color:#a09070;vertical-align:middle}
.mode-row{display:flex;gap:6px;margin-top:8px}
.mode-btn{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid #2a1a0a;background:#0d0d0d;color:#665544;transition:all 0.18s;font-family:'Inter',sans-serif}
.mode-btn.active{background:#1a1208;border-color:#e8c87a;color:#e8c87a}
.preview{background:#0d0d0d;border:0.5px solid #1a1208;border-radius:8px;padding:12px;margin-top:10px;min-height:72px}
.preview-empty{font-size:12px;color:#2a1a0a;text-align:center;padding:16px 0}
.pv-nick{font-family:'Cinzel',serif;font-size:13px;color:#e8c87a;margin-bottom:7px}
.pv-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.pv-label{color:#554433}
.suggestions{background:#0d0d0d;border:0.5px solid #3a2a1a;border-radius:0 0 6px 6px;overflow:hidden;display:none}
.sug-item{padding:8px 10px;font-size:13px;cursor:pointer;color:#a09070;border-top:0.5px solid #1a1208}
.sug-item:hover{background:#1a1208;color:#e8c87a}
.log{max-height:120px;overflow-y:auto;font-size:11px;padding:8px;background:#0d0d0d;border-radius:6px;border:0.5px solid #1a1208;scrollbar-width:thin}
.log p{margin-bottom:2px;line-height:1.4}
.ok{color:#6a8040}.err{color:#804040}.info{color:#806040}.warn{color:#a07020}
hr{border:none;border-top:0.5px solid #1a1208;margin:0}
@media(max-width:640px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div style="max-width:960px;margin:0 auto">
  <h1>⚔ Overlay Control</h1>
  <div class="subtitle">Copa Uruguaya 2026 — Panel de transmisión</div>

  <div class="layout">

    <!-- JUGADOR 1 -->
    <div class="panel">
      <div class="panel-title">Jugador 1 — izquierda</div>
      <label>Nick</label>
      <input id="j1-input" type="text" placeholder="ej: TINCHO" oninput="buscar(1)"/>
      <div class="suggestions" id="j1-sug"></div>
      <div class="preview" id="j1-preview"><div class="preview-empty">Escribí un nick para buscar</div></div>
    </div>

    <!-- JUGADOR 2 -->
    <div class="panel">
      <div class="panel-title">Jugador 2 — derecha</div>
      <label>Nick</label>
      <input id="j2-input" type="text" placeholder="ej: JabsUY" oninput="buscar(2)"/>
      <div class="suggestions" id="j2-sug"></div>
      <div class="preview" id="j2-preview"><div class="preview-empty">Escribí un nick para buscar</div></div>
    </div>

    <!-- ENCUENTRO -->
    <div class="panel">
      <div class="panel-title">Datos del encuentro</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div><label>Grupo</label><input id="enc-grupo" placeholder="B"/></div>
        <div><label>Ronda</label><input id="enc-ronda" placeholder="1"/></div>
        <div><label>Formato</label>
          <select id="enc-formato">
            <option value="Bo3">Bo3</option>
            <option value="Bo5" selected>Bo5</option>
          </select>
        </div>
      </div>
    </div>

    <!-- CONTROL -->
    <div class="panel">
      <div class="panel-title">Control del overlay</div>
      <div style="margin-bottom:12px">
        <span class="dot dot-off" id="st-dot"></span>
        <span class="status-text" id="st-text">Inactivo</span>
      </div>
      <div style="font-size:11px;color:#554433;margin-bottom:6px">Modo</div>
      <div class="mode-row">
        <button class="mode-btn active" onclick="setModo('pre',this)">Presentación</button>
        <button class="mode-btn"        onclick="setModo('mini',this)">Mini</button>
        <button class="mode-btn"        onclick="setModo('off',this)">Oculto</button>
      </div>
      <button class="btn btn-gold" onclick="enviar()" style="margin-top:14px">▶ Enviar al overlay</button>
      <button class="btn btn-outline" onclick="ocultar()">✕ Ocultar</button>
      <button class="btn btn-danger"  onclick="resetear()">↺ Reset</button>
    </div>

    <hr class="full"/>

    <!-- LOG -->
    <div class="panel full">
      <div class="panel-title">Log</div>
      <div class="log" id="log"></div>
    </div>

  </div>
</div>

<script>
const STATS_URL  = 'torneos/stats_copa_2026.json';
const LS_KEY     = 'aua_overlay_state';

let DATA   = null;
let indice = {};
let sel    = { 1: null, 2: null };
let modo   = 'pre';

// ── Log ───────────────────────────────────────────────────────────────────────
function log(msg, tipo = 'info') {
  const el = document.getElementById('log');
  const t  = new Date().toLocaleTimeString('es-UY');
  el.innerHTML = `<p class="${tipo}">[${t}] ${msg}</p>` + el.innerHTML;
}

// ── Cargar stats ──────────────────────────────────────────────────────────────
async function cargarStats() {
  log('Cargando stats...', 'info');
  try {
    const res = await fetch(STATS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();

    indice = {};
    for (const [did, j] of Object.entries(DATA.jugadores)) {
      const clean = j.nick.replace(/[|\[\]]/g,'').trim();
      const lower = clean.toLowerCase();
      const keys  = new Set([lower, did]);
      lower.split(/[\s/|]+/).filter(p=>p.length>1).forEach(p=>keys.add(p));
      const sinPref = lower.replace(/^(fmg\s*|twitch\/)/g,'');
      if (sinPref.length>1) keys.add(sinPref);
      keys.forEach(k => { indice[k] = { ...j, discordId: did }; });
    }
    log(`Stats OK — ${Object.keys(DATA.jugadores).length} jugadores`, 'ok');
  } catch(e) {
    log('Sin stats: ' + e.message, 'warn');
    DATA = { jugadores:{}, meta:{ total_partidas:0 } };
  }
}

// ── Búsqueda ──────────────────────────────────────────────────────────────────
function buscar(num) {
  const val   = document.getElementById(`j${num}-input`).value.trim().toLowerCase();
  const sugEl = document.getElementById(`j${num}-sug`);
  sel[num]    = null;

  if (val.length < 2) {
    sugEl.style.display = 'none';
    document.getElementById(`j${num}-preview`).innerHTML = '<div class="preview-empty">Escribí un nick para buscar</div>';
    return;
  }

  const seen = new Set(), matches = [];
  for (const [k, j] of Object.entries(indice)) {
    if (k.includes(val) && !seen.has(j.discordId)) {
      seen.add(j.discordId);
      matches.push(j);
    }
  }

  if (!matches.length) {
    sugEl.style.display = 'none';
    document.getElementById(`j${num}-preview`).innerHTML = '<div class="preview-empty" style="color:#804040">Sin resultados</div>';
    sel[num] = { nick: document.getElementById(`j${num}-input`).value.trim(), global:{pj:0,pg:0,pp:0,winrate:0}, civs:{}, mapas:{} };
    return;
  }

  if (matches.length === 1) {
    seleccionar(num, matches[0]);
    sugEl.style.display = 'none';
  } else {
    sugEl.innerHTML = matches.slice(0,5).map(j =>
      `<div class="sug-item" onclick='seleccionarById(${num},"${j.discordId}")'>${j.nick.replace(/[|\[\]]/g,'').trim()}</div>`
    ).join('');
    sugEl.style.display = 'block';
  }
}

function seleccionarById(num, did) { seleccionar(num, indice[did]); }

function seleccionar(num, j) {
  sel[num] = j;
  document.getElementById(`j${num}-sug`).style.display = 'none';
  document.getElementById(`j${num}-input`).value = j.nick.replace(/[|\[\]]/g,'').trim();
  document.getElementById(`j${num}-preview`).innerHTML = buildPreview(j);
}

function buildPreview(j) {
  const wr  = j.global?.winrate ?? 0;
  const col = wr >= 60 ? '#a8c860' : wr >= 40 ? '#e8c87a' : '#c87060';
  const top3 = Object.entries(j.civs ?? {}).sort((a,b)=>b[1].pj-a[1].pj).slice(0,3);
  const topM = Object.entries(j.mapas ?? {}).sort((a,b)=>b[1].winrate-a[1].winrate).slice(0,1);
  return `
    <div class="pv-nick">${j.nick.replace(/[|\[\]]/g,'').trim()}</div>
    <div class="pv-row"><span class="pv-label">Winrate</span><span style="color:${col};font-weight:600">${wr}%</span></div>
    <div class="pv-row"><span class="pv-label">Partidas</span><span style="color:#e8c87a">${j.global?.pj??0}</span></div>
    ${top3.map(([c,d])=>`<div class="pv-row"><span class="pv-label">${c}</span><span style="color:${d.winrate>=50?'#a8c860':'#c87060'}">${d.winrate}% (${d.pj}g)</span></div>`).join('')}
    ${topM.length?`<div class="pv-row"><span class="pv-label">Mejor mapa</span><span style="color:#a8c860">${topM[0][0]}</span></div>`:''}
  `;
}

// ── Modo ──────────────────────────────────────────────────────────────────────
function setModo(m, btn) {
  modo = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Acciones — escribe en localStorage, el overlay escucha el evento storage ──
function enviar() {
  if (!sel[1] && !sel[2]) { log('Seleccioná al menos un jugador', 'err'); return; }

  const state = {
    visible: true,
    modo,
    grupo:   document.getElementById('enc-grupo').value.trim() || '?',
    ronda:   document.getElementById('enc-ronda').value.trim() || '?',
    formato: document.getElementById('enc-formato').value,
    j1:      sel[1] ?? null,
    j2:      sel[2] ?? null,
    ts:      Date.now(),
  };

  localStorage.setItem(LS_KEY, JSON.stringify(state));

  const n1 = sel[1]?.nick?.replace(/[|\[\]]/g,'').trim() ?? '?';
  const n2 = sel[2]?.nick?.replace(/[|\[\]]/g,'').trim() ?? '?';
  setStatus('on', `Activo — ${n1} vs ${n2} · ${modo}`);
  log(`✓ Enviado: ${n1} vs ${n2} · modo ${modo}`, 'ok');
}

function ocultar() {
  const s = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  s.visible = false;
  s.ts = Date.now();
  localStorage.setItem(LS_KEY, JSON.stringify(s));
  setStatus('off', 'Overlay oculto');
  log('Overlay ocultado', 'info');
}

function resetear() {
  localStorage.removeItem(LS_KEY);
  setStatus('off', 'Reset OK');
  log('Reset completo', 'warn');
}

function setStatus(tipo, texto) {
  document.getElementById('st-dot').className   = 'dot dot-' + tipo;
  document.getElementById('st-text').textContent = texto;
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', cargarStats);
</script>
</body>
</html>
