<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civilizaciones de Host</title>
    <style>
      /* Contenedor principal */
      .civ-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-start; /* Centra el contenido */
      }

      /* Tarjeta de cada civilización en forma circular */
      .civ-card {
        position: relative;
        width: 110px;
        height: 110px;
        text-align: center;
        border-radius: 50%; /* Forma circular */
        border: 3px solid #b8860b; /* Borde dorado oscuro */
        background-color: transparent; /* Fondo transparente */
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: transform 0.2s ease; /* Animación en hover */
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
      }

      /* Colores para picks y bans */
      .civ-pick {
        background-color: #90ee9000;
      }
      .civ-ban {
        background-color: #ffcccb;
      }

      /* Imagen de la civilización dentro del círculo */
      .civ-img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 50%;
      }

      /* Nombre de la civilización en la parte inferior del círculo */
.civ-name {
    position: absolute;
    bottom: 5px; /* Ajusta la posición hacia la parte inferior */
    font-weight: bold;
    font-size: 14px;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    background-color: rgba(255, 255, 255, 0.7); /* Fondo semitransparente para mejor legibilidad */
    padding: 2px 5px;
    border-radius: 5px;
}

/* Imagen de estado (ganador o perdedor) en la parte superior del círculo */
.status-image {
    width: 50px;
    position: absolute;
    top: 5px; /* Coloca la imagen de estado en la parte superior */
    left: 50%;
    transform: translateX(-50%); /* Centra la imagen */
    z-index: 1; /* Coloca la imagen de estado por encima de la imagen */
}

      /* Indicador de carga */
      #loadingIndicator {
        font-size: 20px;
        color: #ffcc00;
        text-align: center;
        margin-top: 20px;
      }

      /* Animación de hover para la tarjeta */
      .civ-card:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <div id="loadingIndicator">Cargando...</div>
    <div class="civ-container" id="hostCivsContainer"></div>

    <script>
      // Detectar cambios en localStorage y actualizar el DOM cuando ocurran
      window.addEventListener("storage", (event) => {
        console.log(event);
        if (event.key === "civsData") {
          // Solo actualiza si la clave `civsData` ha cambiado
          displayHostCivs(); // o llama a la función que renderiza en civguest.html
        }
      });
      // Función para obtener los detalles de las civilizaciones desde el JSON
      async function fetchCivilizationDetails() {
    const cachedData = localStorage.getItem('civilizations');
    
    if (cachedData) {
        return JSON.parse(cachedData);
    }

    try {
        const response = await fetch('https://raw.githubusercontent.com/Alegenio2/civs/refs/heads/main/civs.json');
        const data = await response.json();
        localStorage.setItem('civilizations', JSON.stringify(data)); // Guardar en localStorage
        return data;
    } catch (error) {
        console.error("Error al obtener las civilizaciones:", error);
    }
}

      async function displayHostCivs() {
        const hostCivsContainer = document.getElementById("hostCivsContainer");
        const loadingIndicator = document.getElementById("loadingIndicator");

        // Ocultar el indicador de carga
        loadingIndicator.style.display = "none";

        // Limpiar el contenedor para evitar duplicaciones
        hostCivsContainer.innerHTML = "";

        const civsData = JSON.parse(localStorage.getItem("civsData")) || [];
        const civDetails = await fetchCivilizationDetails();

        const pickCivs = civsData.filter(
          (civ) =>
            civ.actionType === "pick" &&
            civ.player === "HOST" &&
            civ.player !== "NONE"
        );
        const banCivs = civsData.filter(
          (civ) =>
            civ.actionType === "ban" &&
            civ.player === "HOST" &&
            civ.player !== "NONE"
        );
        const filteredCivs = [...pickCivs, ...banCivs];

        filteredCivs.forEach((civ) => {
          const civDetail = civDetails.find((detail) => detail.id === civ.name);
          if (civDetail) {
            const civElement = document.createElement("div");
            civElement.className = `civ-card ${
              civ.actionType === "pick" ? "civ-pick" : "civ-ban"
            }`;
            civElement.setAttribute("data-civ-id", civ.name);

            const imgElement = document.createElement("img");
            imgElement.className = "civ-img";
            imgElement.src = civDetail.imagen;
            imgElement.alt = civDetail.nombre;

            const nameElement = document.createElement("div");
            nameElement.className = "civ-name";
            nameElement.textContent = civDetail.nombre;

            // Agregar imagen de estado si es ganador o perdedor
            if (civ.won) {
              const wonImage = document.createElement("img");
              wonImage.src = "img/gano.svg";
              wonImage.alt = "Ganador";
              wonImage.classList.add("status-image");
              civElement.appendChild(wonImage);
            }
            if (civ.lost) {
              const lostImage = document.createElement("img");
              lostImage.src = "img/perdio.svg";
              lostImage.alt = "Perdedor";
              lostImage.classList.add("status-image");
              civElement.appendChild(lostImage);
            }

            civElement.appendChild(imgElement);
            civElement.appendChild(nameElement);
            hostCivsContainer.appendChild(civElement);
          }
        });
      }

      // Función para marcar como ganador
      function markAsWinner(civName, isWinner) {
        const civsData = JSON.parse(localStorage.getItem("civsData"));
        const civ = civsData.find((c) => c.name === civName);
        if (civ) civ.won = isWinner;
        localStorage.setItem("civsData", JSON.stringify(civsData));

        // Actualizar la visualización sin recargar la página
        displayHostCivs();
      }

      // Función para marcar como perdedor
      function markAsLoser(civName, isLoser) {
        const civsData = JSON.parse(localStorage.getItem("civsData"));
        const civ = civsData.find((c) => c.name === civName);
        if (civ) civ.lost = isLoser;
        localStorage.setItem("civsData", JSON.stringify(civsData));

        // Actualizar la visualización sin recargar la página
        displayHostCivs();
      }

      // Ejecutar al cargar la página
      document.addEventListener("DOMContentLoaded", displayHostCivs);
    </script>
  </body>
</html>
