<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Drafts — Copa Uruguaya 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/draftmapas.css">
    <link rel="stylesheet" href="css/draftcivs.css">
</head>
<body>

<header class="draft-header">
    <div class="draft-header-inner">
        <div class="draft-logo">⚔</div>
        <div>
            <h1>Administrador de Drafts</h1>
            <div class="draft-subtitle">Copa Uruguaya 2026</div>
        </div>
    </div>
</header>

<main class="draft-main">

    <!-- JUGADORES -->
    <section class="players-bar">
        <div class="player-card host">
            <div class="player-role">HOST</div>
            <div class="player-name" id="hostName">—</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="player-card guest">
            <div class="player-role">GUEST</div>
            <div class="player-name" id="guestName">—</div>
        </div>
    </section>

    <!-- INPUTS -->
    <section class="inputs-grid">
        <div class="input-block">
            <label for="draftCode">Código Draft de Civs</label>
            <div class="input-row">
                <input type="text" id="draftCode" placeholder="ej: AbCdE"/>
                <button onclick="fetchAndSaveDraftData()">Cargar</button>
            </div>
            <div class="swap-row">
                <span class="swap-label">Civs</span>
                <div class="name-inputs">
                    <div class="name-field">
                        <label class="lbl-host">HOST</label>
                        <input type="text" id="civHostName" placeholder="Nombre host" oninput="actualizarNombres()"/>
                    </div>
                    <div class="name-field">
                        <label class="lbl-guest">GUEST</label>
                        <input type="text" id="civGuestName" placeholder="Nombre guest" oninput="actualizarNombres()"/>
                    </div>
                </div>
                <span class="swap-badge" id="civSwapBadge">SWAPPED</span>
                <button class="swap-btn" onclick="swapCivs()">⇄ Swap Civs</button>
            </div>
        </div>

        <div class="input-block">
            <label for="mapDraftCode">Código Draft de Mapas</label>
            <div class="input-row">
                <input type="text" id="mapDraftCode" placeholder="ej: XyZwQ"/>
                <button onclick="fetchAndSaveMapData()">Cargar</button>
            </div>
            <div class="swap-row">
                <span class="swap-label">Mapas</span>
                <div class="name-inputs">
                    <div class="name-field">
                        <label class="lbl-host">HOST</label>
                        <input type="text" id="mapHostName" placeholder="Nombre host" oninput="actualizarNombres()"/>
                    </div>
                    <div class="name-field">
                        <label class="lbl-guest">GUEST</label>
                        <input type="text" id="mapGuestName" placeholder="Nombre guest" oninput="actualizarNombres()"/>
                    </div>
                </div>
                <span class="swap-badge" id="mapSwapBadge">SWAPPED</span>
                <button class="swap-btn" onclick="swapMapas()">⇄ Swap Mapas</button>
            </div>
        </div>
    </section>

    <!-- MAPAS -->
    <section class="draft-section" id="mapContainer">
        <h2 class="section-title">🗺 Mapas</h2>
        <div class="maps-grid">
            <div class="maps-col">
                <div class="col-label host-label" id="hostMapsLabel">Host</div>
                <div id="hostMaps" class="map-section"></div>
            </div>
            <div class="maps-col">
                <div class="col-label neutral-label">Neutrales</div>
                <div id="neutralMaps" class="map-section"></div>
            </div>
            <div class="maps-col">
                <div class="col-label guest-label" id="guestMapsLabel">Guest</div>
                <div id="guestMaps" class="map-section"></div>
            </div>
        </div>
    </section>

    <!-- CIVS -->
    <section class="draft-section">
        <h2 class="section-title">🛡 Civilizaciones</h2>
        <div class="civs-grid">
            <div class="civs-col">
                <div class="col-label host-label" id="hostCivsLabel">Host Picks</div>
                <div id="hostPicksColumn" class="column"></div>
                <div class="col-label host-label" style="margin-top:10px" id="hostBansLabel">Host Bans</div>
                <div id="hostBansColumn" class="column"></div>
                <div id="hostSnipesColumn" class="column"></div>
            </div>
            <div class="civs-col neutral-col">
                <div class="col-label neutral-label">Civs Neutrales</div>
                <div id="neutralCivsColumn" class="column"></div>
            </div>
            <div class="civs-col">
                <div class="col-label guest-label" id="guestCivsLabel">Guest Picks</div>
                <div id="guestPicksColumn" class="column"></div>
                <div class="col-label guest-label" style="margin-top:10px" id="guestBansLabel">Guest Bans</div>
                <div id="guestBansColumn" class="column"></div>
                <div id="guestSnipesColumn" class="column"></div>
            </div>
        </div>
    </section>

    <div class="update-bar">
        <button class="btn-update" id="btnActualizar">↺ Actualizar Overlay</button>
    </div>

</main>

<footer class="draft-footer">
    <span>Copa Uruguaya 2026 · AUA</span>
    <span style="color:#3a2a1a">·</span>
    <span>Diseñado por JabsUY</span>
</footer>

<script>
let civSwapped = false;
let mapSwapped = false;

function cargarEstado() {
    civSwapped = localStorage.getItem('civSwapped') === 'true';
    mapSwapped = localStorage.getItem('mapSwapped') === 'true';
    document.getElementById('civSwapBadge').classList.toggle('visible', civSwapped);
    document.getElementById('mapSwapBadge').classList.toggle('visible', mapSwapped);
    const n = JSON.parse(localStorage.getItem('draftNames') || '{}');
    if (n.civHost)  document.getElementById('civHostName').value  = n.civHost;
    if (n.civGuest) document.getElementById('civGuestName').value = n.civGuest;
    if (n.mapHost)  document.getElementById('mapHostName').value  = n.mapHost;
    if (n.mapGuest) document.getElementById('mapGuestName').value = n.mapGuest;
    actualizarNombres();
}

function swapCivs() {
    civSwapped = !civSwapped;
    localStorage.setItem('civSwapped', civSwapped);
    document.getElementById('civSwapBadge').classList.toggle('visible', civSwapped);
    actualizarNombres();
    location.reload();
}

function swapMapas() {
    mapSwapped = !mapSwapped;
    localStorage.setItem('mapSwapped', mapSwapped);
    document.getElementById('mapSwapBadge').classList.toggle('visible', mapSwapped);
    actualizarNombres();
    location.reload();
}

function actualizarNombres() {
    const ch = document.getElementById('civHostName').value.trim();
    const cg = document.getElementById('civGuestName').value.trim();
    const mh = document.getElementById('mapHostName').value.trim();
    const mg = document.getElementById('mapGuestName').value.trim();

    localStorage.setItem('draftNames', JSON.stringify({ civHost:ch, civGuest:cg, mapHost:mh, mapGuest:mg }));

    // Labels con swap aplicado
    const chLabel = civSwapped ? (cg||'Guest') : (ch||'Host');
    const cgLabel = civSwapped ? (ch||'Host')  : (cg||'Guest');
    const mhLabel = mapSwapped ? (mg||'Guest') : (mh||'Host');
    const mgLabel = mapSwapped ? (mh||'Host')  : (mg||'Guest');

    document.getElementById('hostCivsLabel').textContent  = chLabel + ' Picks';
    document.getElementById('hostBansLabel').textContent  = chLabel + ' Bans';
    document.getElementById('guestCivsLabel').textContent = cgLabel + ' Picks';
    document.getElementById('guestBansLabel').textContent = cgLabel + ' Bans';
    document.getElementById('hostMapsLabel').textContent  = mhLabel;
    document.getElementById('guestMapsLabel').textContent = mgLabel;
    document.getElementById('hostName').textContent  = chLabel;
    document.getElementById('guestName').textContent = cgLabel;
}

document.getElementById("btnActualizar").addEventListener("click", function () {
    if (typeof updatedCivsData !== 'undefined') localStorage.setItem('civsData', JSON.stringify(updatedCivsData));
    if (typeof updatedMapsData !== 'undefined') localStorage.setItem('mapasData', JSON.stringify(updatedMapsData));
    location.reload();
});

document.addEventListener('DOMContentLoaded', cargarEstado);
</script>
<script src="js/admindraftcivs.js"></script>
<script src="js/admindraftmapas.js"></script>
</body>
</html>
