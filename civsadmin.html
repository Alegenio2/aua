<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civilizaciones Neutrales</title>
    <style>
      .civ-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }

      /* Tarjeta de cada civilización en forma circular */
      .civ-card {
        position: relative;
        width: 110px;
        height: 110px;
        text-align: center;
        border-radius: 50%; /* Forma circular */
        border: 3px solid #b8860b; /* Borde dorado oscuro */
        background-color: transparent; /* Fondo transparente */
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: transform 0.2s ease; /* Animación en hover */
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
      }
      /* Colores para picks y bans */
      .civ-pick {
        background-color: #90ee9000;
      }
      .civ-ban {
        background-color: #ffcccb;
      }

      /* Imagen de la civilización dentro del círculo */
      .civ-img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 50%;
      }

      /* Nombre de la civilización en la parte inferior del círculo */
      .civ-name {
        position: absolute;
        bottom: 5px; /* Ajusta la posición hacia la parte inferior */
        font-weight: bold;
        font-size: 14px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        background-color: rgba(
          255,
          255,
          255,
          0.7
        ); /* Fondo semitransparente para mejor legibilidad */
        padding: 2px 5px;
        border-radius: 5px;
      }

      /* Imagen de estado (ganador o perdedor) en la parte superior del círculo */
      .status-image {
        width: 50px;
        position: absolute;
        top: 5px; /* Coloca la imagen de estado en la parte superior */
        left: 50%;
        transform: translateX(-50%); /* Centra la imagen */
        z-index: 1; /* Coloca la imagen de estado por encima de la imagen */
      }

      /* Indicador de carga */
      #loadingIndicator {
        font-size: 20px;
        color: #ffcc00;
        text-align: center;
        margin-top: 20px;
      }

      /* Animación de hover para la tarjeta */
      .civ-card:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <div id="loadingIndicator">Cargando...</div>
    <div class="civ-container" id="neutralCivsContainer"></div>

    <script>
      // Detectar cambios en localStorage y actualizar el DOM cuando ocurran
      window.addEventListener("storage", (event) => {
        console.log(event);
        if (event.key === "neutralCivs") {
          // Solo actualiza si la clave `neutralCivs` ha cambiado
          renderNeutralCivs(); // o llama a la función que renderiza en civadmin.html
        }
      });
      async function fetchCivilizationDetails() {
        const cachedData = localStorage.getItem("civilizations");

        if (cachedData) {
          return JSON.parse(cachedData);
        }

        if (cachedData) {
          return JSON.parse(cachedData);
        }

        try {
          const response = await fetch(
            "https://raw.githubusercontent.com/Alegenio2/civs/refs/heads/main/civs.json"
          );
          const data = await response.json();
          localStorage.setItem("civilizations", JSON.stringify(data));
          return data;
        } catch (error) {
          console.error("Error al obtener las civilizaciones:", error);
          return [];
        }
      }

      async function renderNeutralCivs() {
        const container = document.getElementById("neutralCivsContainer");
        const loading = document.getElementById("loadingIndicator");
        container.innerHTML = "";
        loading.style.display = "none";

        const civs = JSON.parse(localStorage.getItem("neutralCivs")) || [];
        const civDetails = await fetchCivilizationDetails();

        civs.forEach((civ) => {
          const detail = civDetails.find((d) => d.id === civ.name);
          if (detail) {
            const civElement = document.createElement("div");
            civElement.className = `civ-card ${
              civ.actionType === "pick" ? "civ-pick" : "civ-ban"
            }`;
            civElement.setAttribute("data-civ-id", civ.name);

            const img = document.createElement("img");
            img.className = "civ-img";
            img.src = detail.imagen;
            img.alt = detail.nombre;

            const name = document.createElement("div");
            name.className = "civ-name";
            name.textContent = detail.nombre;

            // Estado de victoria o derrota si existiera
            if (civ.won) {
              const wonImg = document.createElement("img");
              wonImg.src = "img/gano.svg";
              wonImg.alt = "Ganador";
              wonImg.className = "status-image";
              civElement.appendChild(wonImg);
            }
            if (civ.lost) {
              const lostImg = document.createElement("img");
              lostImg.src = "img/perdio.svg";
              lostImg.alt = "Perdedor";
              lostImg.className = "status-image";
              civElement.appendChild(lostImg);
            }

            civElement.appendChild(img);
            civElement.appendChild(name);
            container.appendChild(civElement);
          }
        });
      }

      document.addEventListener("DOMContentLoaded", renderNeutralCivs);
    </script>
  </body>
</html>
