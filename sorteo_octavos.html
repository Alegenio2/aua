<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sorteo Octavos | Copa Uruguaya 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Mantenemos tu estilo visual premium */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e0e0e6; font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-family: 'Cinzel', serif; color: #d4a843; font-size: 32px; letter-spacing: 4px; text-shadow: 0 0 20px rgba(212, 168, 67, 0.3); }
    
    .bombos-wrapper { display: flex; gap: 30px; margin-bottom: 40px; width: 100%; max-width: 1000px; }
    .bombo-box { flex: 1; background: rgba(20, 20, 30, 0.6); border: 1px solid rgba(212, 168, 67, 0.15); border-radius: 8px; padding: 20px; backdrop-filter: blur(10px); }
    .bombo-box h2 { font-family: 'Cinzel', serif; font-size: 16px; color: #d4a843; text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(212, 168, 67, 0.2); padding-bottom: 10px; }
    
    .player-tag { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 10px 15px; margin-bottom: 8px; border-radius: 4px; transition: all 0.5s ease; }
    .player-tag.selected { background: rgba(212, 168, 67, 0.3); border-color: #d4a843; transform: scale(1.05); box-shadow: 0 0 15px rgba(212, 168, 67, 0.4); }
    .player-tag.used { opacity: 0.15; transform: scale(0.9); filter: grayscale(1); }

    .btn-revelar { background: linear-gradient(135deg, #d4a843 0%, #a67c2d 100%); color: #0a0a0a; border: none; padding: 16px 45px; font-family: 'Cinzel', serif; font-weight: 900; font-size: 16px; cursor: pointer; border-radius: 4px; margin-bottom: 40px; transition: all 0.3s; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); }
    .btn-revelar:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(212, 168, 67, 0.3); }

    .bracket-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; width: 100%; max-width: 1100px; }
    .matchup-card { background: linear-gradient(180deg, rgba(30, 30, 45, 0.8) 0%, rgba(15, 15, 25, 0.9) 100%); border: 1px solid rgba(212, 168, 67, 0.2); padding: 20px; border-radius: 6px; text-align: center; animation: matchAppear 0.6s ease-out forwards; }
    @keyframes matchAppear { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .vs { font-family: 'Cinzel', serif; color: #d4a843; margin: 10px 0; font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Copa Uruguaya 2026</h1>
    <p style="color: #888; margin-top: 10px; letter-spacing: 2px;">SORTEO ALEATORIO DE OCTAVOS</p>
  </div>

  <div class="bombos-wrapper">
    <div class="bombo-box">
      <h2>Bombo 1 (Cabezas de Serie)</h2>
      <div id="bombo1-list"></div>
    </div>
    <div class="bombo-box">
      <h2>Bombo 2 (Clasificados)</h2>
      <div id="bombo2-list"></div>
    </div>
  </div>

  <button class="btn-revelar" id="btnMain" onclick="gestionarSorteo()">Revelar Cabeza de Serie</button>

  <div class="bracket-grid" id="bracket"></div>

  <script>
    let partidosRestantes = [];
    let seleccionadoB1 = null;
    let etapa = "B1"; // B1 = Buscando cabeza, B2 = Buscando rival

    async function init() {
      try {
        const resp = await fetch('torneos/1v1_copa_uruguaya_2026.json');
        const data = await resp.json();
        partidosRestantes = [...data.eliminatorias.octavos];

        const b1 = document.getElementById('bombo1-list');
        const b2 = document.getElementById('bombo2-list');

        partidosRestantes.forEach(m => {
          b1.innerHTML += `<div class="player-tag" id="tag-${m.jugador1Id}">${m.jugador1Nick}</div>`;
          b2.innerHTML += `<div class="player-tag" id="tag-${m.jugador2Id}">${m.jugador2Nick}</div>`;
        });
      } catch (e) { console.error(e); }
    }

    function gestionarSorteo() {
      const btn = document.getElementById('btnMain');

      if (etapa === "B1") {
        // Seleccionamos un partido aleatorio de los que quedan
        const index = Math.floor(Math.random() * partidosRestantes.length);
        seleccionadoB1 = partidosRestantes.splice(index, 1)[0];

        // Efecto visual en Bombo 1
        const tag = document.getElementById(`tag-${seleccionadoB1.jugador1Id}`);
        tag.classList.add('selected');
        
        btn.innerText = `Revelar Rival de ${seleccionadoB1.jugador1Nick}`;
        etapa = "B2";
      } 
      else if (etapa === "B2") {
        // Revelamos el rival (jugador 2 del partido que ya elegimos)
        const tagB1 = document.getElementById(`tag-${seleccionadoB1.jugador1Id}`);
        const tagB2 = document.getElementById(`tag-${seleccionadoB1.jugador2Id}`);
        
        tagB1.classList.remove('selected');
        tagB1.classList.add('used');
        tagB2.classList.add('used');

        const bracket = document.getElementById('bracket');
        bracket.innerHTML += `
          <div class="matchup-card">
            <div style="font-size:11px; color:#d4a843; margin-bottom:10px">OCTAVOS DE FINAL</div>
            <div style="font-size:18px; font-weight:700">${seleccionadoB1.jugador1Nick}</div>
            <div class="vs">VS</div>
            <div style="font-size:18px; font-weight:700">${seleccionadoB1.jugador2Nick}</div>
          </div>
        `;

        if (partidosRestantes.length === 0) {
          btn.innerText = "SORTEO FINALIZADO";
          btn.disabled = true;
        } else {
          btn.innerText = "Revelar Siguiente Cabeza de Serie";
          etapa = "B1";
        }
      }
    }

    init();
  </script>
</body>
</html>
