<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorteo Épico | Copa Uruguaya 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0f;
  color: #e0e0e6;
  font-family: 'Barlow Condensed', sans-serif;
  padding: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header h1 {
  font-family: 'Cinzel', serif;
  color: #d4a843;
  letter-spacing: 4px;
  margin-bottom: 25px;
}

.bombos-wrapper {
  display: flex;
  gap: 20px;
  width: 900px;
  margin-bottom: 20px;
}

.bombo-box {
  flex: 1;
  background: #14141e;
  padding: 10px;
  border-radius: 6px;
}

.player-tag {
  padding: 6px;
  margin: 3px 0;
  background: rgba(255,255,255,0.05);
  transition: 0.2s;
}

.player-tag.active {
  background: #d4a843;
  color: black;
}

.player-tag.used {
  opacity: 0.2;
}

/* BOTON */
.btn {
  padding: 12px 30px;
  background: #d4a843;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin-bottom: 25px;
}

/* BRACKET */
.bracket {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  width: 1000px;
}

.slot {
  height: 110px;
  border: 1px dashed #444;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.card {
  width: 100%;
  height: 100%;
  border: 1px solid #d4a843;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #111;
  animation: pop 0.4s ease;
}

@keyframes pop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

/* ANIMACION RULETA */
.roulette {
  font-size: 14px;
  color: #d4a843;
  animation: blink 0.1s infinite;
}

@keyframes blink {
  50% { opacity: 0.2; }
}
</style>
</head>

<body>

<h1>COPA URUGUAYA 2026</h1>

<div class="bombos-wrapper">
  <div id="b1"></div>
  <div id="b2"></div>
</div>

<button class="btn" onclick="sortear()">SORTEAR</button>

<div class="bracket">
  <div id="slot-OF1" class="slot"></div>
  <div id="slot-OF2" class="slot"></div>
  <div id="slot-OF3" class="slot"></div>
  <div id="slot-OF4" class="slot"></div>
  <div id="slot-OF5" class="slot"></div>
  <div id="slot-OF6" class="slot"></div>
  <div id="slot-OF7" class="slot"></div>
  <div id="slot-OF8" class="slot"></div>
</div>

<script>
let pool = [];
let etapa = "B1";
let actual = null;
let slotsRandom = [];

async function init() {
  const data = await fetch('torneos/1v1_copa_uruguaya_2026.json').then(r=>r.json());

  pool = data.eliminatorias.octavos;

  // slots visuales random
  slotsRandom = [...pool.map(p=>p.partidoId)];
  slotsRandom.sort(()=>Math.random()-0.5);

  pool.forEach(m=>{
    b1.innerHTML += `<div class="player-tag" id="t1-${m.jugador1Id}">${m.jugador1Nick}</div>`;
    b2.innerHTML += `<div class="player-tag" id="t2-${m.jugador2Id}">${m.jugador2Nick}</div>`;
  });
}

function randomHighlight(containerId){
  const list = document.querySelectorAll(`#${containerId} .player-tag:not(.used)`);
  list.forEach(el=>el.classList.remove('active'));

  const r = list[Math.floor(Math.random()*list.length)];
  if(r) r.classList.add('active');
}

function sortear(){

  if(etapa==="B1"){
    const i = Math.floor(Math.random()*pool.length);
    actual = pool.splice(i,1)[0];

    let ticks = 0;

    const interval = setInterval(()=>{
      randomHighlight("b1");
      ticks++;
      if(ticks>15){
        clearInterval(interval);
        document.getElementById(`t1-${actual.jugador1Id}`).classList.add('active');
      }
    },80);

    etapa="B2";
  }

  else {

    let ticks = 0;

    const interval = setInterval(()=>{
      randomHighlight("b2");
      ticks++;

      if(ticks>20){
        clearInterval(interval);

        const t1 = document.getElementById(`t1-${actual.jugador1Id}`);
        const t2 = document.getElementById(`t2-${actual.jugador2Id}`);

        t1.classList.remove('active');
        t1.classList.add('used');
        t2.classList.add('used');

        // slot falso 🔥
        const fake = slotsRandom.shift();
        const slot = document.getElementById(`slot-${fake}`);

        slot.innerHTML = `
          <div class="card">
            <div>${actual.jugador1Nick}</div>
            <div style="color:#d4a843">VS</div>
            <div>${actual.jugador2Nick}</div>
          </div>
        `;

        etapa="B1";
      }
    },80);
  }
}

init();
</script>

</body>
</html>
