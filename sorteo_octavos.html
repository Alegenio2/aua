<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sorteo Épico | Copa Uruguaya 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e0e0e6; font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
    
    .header h1 { font-family: 'Cinzel', serif; color: #d4a843; font-size: 28px; text-align: center; letter-spacing: 4px; text-shadow: 0 0 15px rgba(212, 168, 67, 0.4); margin-bottom: 30px; }

    .bombos-wrapper { display: flex; gap: 20px; margin-bottom: 30px; width: 100%; max-width: 900px; }
    .bombo-box { flex: 1; background: rgba(20, 20, 30, 0.8); border: 1px solid rgba(212, 168, 67, 0.2); border-radius: 8px; padding: 15px; }
    .bombo-box h2 { font-family: 'Cinzel', serif; font-size: 14px; color: #d4a843; text-align: center; border-bottom: 1px solid rgba(212, 168, 67, 0.2); padding-bottom: 8px; margin-bottom: 10px; }
    
    .player-tag { background: rgba(255, 255, 255, 0.03); padding: 8px 12px; margin-bottom: 5px; border-radius: 4px; font-size: 14px; transition: all 0.5s ease; border-left: 2px solid transparent; }
    .player-tag.active { border-left-color: #d4a843; background: rgba(212, 168, 67, 0.2); transform: translateX(5px); box-shadow: 0 0 10px rgba(212, 168, 67, 0.3); }
    .player-tag.used { opacity: 0.1; filter: grayscale(1); }

    .controls { margin-bottom: 30px; }
    .btn-sorteo { background: linear-gradient(135deg, #d4a843 0%, #a67c2d 100%); color: #0a0a0a; border: none; padding: 15px 40px; font-family: 'Cinzel', serif; font-weight: 900; cursor: pointer; border-radius: 4px; transition: 0.3s; }
    .btn-sorteo:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(212, 168, 67, 0.5); }

    /* GRID DE CRUCES ALEATORIOS */
    .bracket-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4 arriba, 4 abajo */
      gap: 15px;
      width: 100%;
      max-width: 1200px;
    }

    .slot-partido {
      height: 120px;
      border: 1px dashed rgba(212, 168, 67, 0.1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.3s;
    }

    .matchup-card {
      width: 100%; height: 100%;
      background: linear-gradient(180deg, rgba(30, 30, 45, 0.9) 0%, rgba(15, 15, 25, 1) 100%);
      border: 1px solid #d4a843;
      padding: 15px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    .vs-text { font-family: 'Cinzel', serif; color: #d4a843; font-size: 12px; margin: 5px 0; }
    .p-name { font-weight: 700; font-size: 15px; text-align: center; }
  </style>
</head>
<body>

  <div class="header">
    <h1>COPA URUGUAYA 2026</h1>
  </div>

  <div class="bombos-wrapper">
    <div class="bombo-box">
      <h2>CABEZAS DE SERIE</h2>
      <div id="b1"></div>
    </div>
    <div class="bombo-box">
      <h2>CLASIFICADOS</h2>
      <div id="b2"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-sorteo" id="mainBtn" onclick="sortearProximo()">SORTEAR LLAVE AL AZAR</button>
  </div>

  <div class="bracket-container">
    <div id="slot-OF1" class="slot-partido"></div>
    <div id="slot-OF2" class="slot-partido"></div>
    <div id="slot-OF3" class="slot-partido"></div>
    <div id="slot-OF4" class="slot-partido"></div>
    <div id="slot-OF5" class="slot-partido"></div>
    <div id="slot-OF6" class="slot-partido"></div>
    <div id="slot-OF7" class="slot-partido"></div>
    <div id="slot-OF8" class="slot-partido"></div>
  </div>

  <script>
    let poolPartidos = [];
    let etapa = "B1"; 
    let partidoActual = null;

    async function init() {
      const resp = await fetch('torneos/1v1_copa_uruguaya_2026.json');
      const data = await resp.json();
      poolPartidos = data.eliminatorias.octavos;

      const b1 = document.getElementById('b1');
      const b2 = document.getElementById('b2');

      poolPartidos.forEach(m => {
        b1.innerHTML += `<div class="player-tag" id="t1-${m.jugador1Id}">${m.jugador1Nick}</div>`;
        b2.innerHTML += `<div class="player-tag" id="t2-${m.jugador2Id}">${m.jugador2Nick}</div>`;
      });
    }

    function sortearProximo() {
      const btn = document.getElementById('mainBtn');

      if (etapa === "B1") {
        // Elegimos un partido al azar de los que aún no se han revelado
        const randomIndex = Math.floor(Math.random() * poolPartidos.length);
        partidoActual = poolPartidos.splice(randomIndex, 1)[0];

        // Resaltamos al J1 en el bombo
        document.getElementById(`t1-${partidoActual.jugador1Id}`).classList.add('active');
        btn.innerText = `¿Quién enfrenta a ${partidoActual.jugador1Nick}?`;
        etapa = "B2";
      } 
      else {
        // Revelamos el rival y lo mandamos a su slot correspondiente en el grid
        const t1 = document.getElementById(`t1-${partidoActual.jugador1Id}`);
        const t2 = document.getElementById(`t2-${partidoActual.jugador2Id}`);
        
        t1.classList.remove('active');
        t1.classList.add('used');
        t2.classList.add('used');

        // Buscamos el slot predefinido (ej: "slot-OF1")
        const slot = document.getElementById(`slot-${partidoActual.partidoId}`);
        slot.innerHTML = `
          <div class="matchup-card">
            <div style="font-size:9px; color:#d4a843; margin-bottom:5px">LLAVE ${partidoActual.partidoId}</div>
            <div class="p-name">${partidoActual.jugador1Nick}</div>
            <div class="vs-text">VS</div>
            <div class="p-name">${partidoActual.jugador2Nick}</div>
          </div>
        `;
        slot.style.border = "none";

        if (poolPartidos.length === 0) {
          btn.innerText = "SORTEO FINALIZADO";
          btn.disabled = true;
        } else {
          btn.innerText = "SORTEAR SIGUIENTE CABEZA";
          etapa = "B1";
        }
      }
    }

    init();
  </script>
</body>
</html>
