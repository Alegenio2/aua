<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sorteo Octavos | Copa Uruguaya 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
/* Uso exacto de tus variables de color */
:root {
  --gold:   #e8c87a; --gold2:  #c8a040; --gold3:  #f0d890;
  --brown:  #3a2a1a; --bg0:    #0d0d0d; --bg1:    #131008;
  --bg2:    #1a1208; --bg3:    #22180a; --text:   #e8e0d0;
  --muted:  #a09070; --dim:    #665544; --border: rgba(232,200,122,0.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg0); color: var(--text); font-family: 'Open Sans', sans-serif; min-height: 100vh; }

/* ══ HEADER (TU DISEÑO) ══ */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; background: linear-gradient(180deg, #1a0a00 0%, var(--bg1) 100%);
  border-bottom: 1px solid var(--brown); position: sticky; top: 0; z-index: 100;
}
.header-left h1 { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold); letter-spacing: 1px; }
header nav a { color: var(--muted); text-decoration: none; font-size: 13px; padding: 0 10px; transition: 0.2s; }
header nav a:hover, header nav a.active { color: var(--gold); }

/* ══ HERO (TU DISEÑO) ══ */
.sorteo-hero { text-align: center; padding: 30px 20px; border-bottom: 1px solid var(--border); }
.sorteo-hero h2 { font-family: 'Cinzel', serif; font-size: 28px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }

/* ══ LAYOUT SORTEO ══ */
main { max-width: 1200px; margin: 0 auto; padding: 20px; }

.sorteo-layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }

/* BOMBOS */
.bombos-panel { display: flex; flex-direction: column; gap: 15px; }
.bombo-card { background: var(--bg2); border: 1px solid var(--brown); border-radius: 8px; padding: 15px; }
.bombo-card.activo { border-color: var(--gold); box-shadow: 0 0 15px rgba(232,200,122,0.1); }
.bombo-header { font-family: 'Cinzel'; color: var(--gold); font-size: 14px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

.bolilla {
  display: block; padding: 6px 12px; margin: 4px 0; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 4px; font-size: 12px; transition: 0.3s;
}
.bolilla.active { background: var(--gold); color: var(--bg0); font-weight: bold; transform: scale(1.05); }
.bolilla.used { opacity: 0.2; filter: grayscale(1); }

/* BRACKET GRID */
.bracket-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
.slot { 
  height: 100px; border: 1px dashed var(--dim); border-radius: 8px; 
  display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2);
}

.match-card {
  width: 100%; height: 100%; background: var(--bg2); border: 1px solid var(--gold2);
  border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: slideIn 0.5s ease-out;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.nick { font-family: 'Cinzel'; font-weight: 700; color: var(--text); }
.vs { color: var(--gold2); font-size: 10px; margin: 4px 0; }

.btn-main {
  background: var(--brown); border: 1px solid var(--gold2); color: var(--gold);
  padding: 12px 30px; font-family: 'Cinzel'; cursor: pointer; border-radius: 4px;
  width: 100%; margin-bottom: 20px; transition: 0.3s;
}
.btn-main:hover:not(:disabled) { background: var(--bg3); box-shadow: 0 0 10px var(--gold2); }
.btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

</style>
</head>
<body>

<header>
  <div class="header-left"><h1>Asociación Uruguaya de Age</h1></div>
  <nav class="header-right">
    <a href="#">Home</a>
    <a href="#">Eventos</a>
    <a href="#">Stats Copa</a>
    <a href="#" class="active">Sorteo Octavos</a>
  </nav>
</header>

<div class="sorteo-hero">
  <h2>Copa Uruguaya 2026</h2>
  <div style="color: var(--muted); font-size: 12px; letter-spacing: 2px;">FASE DE ELIMINACIÓN DIRECTA</div>
</div>

<main>
  <div class="sorteo-layout">
    <aside>
      <button class="btn-main" id="btnAction" onclick="procesarSorteo()">Sortear Cabeza de Serie</button>
      
      <div class="bombos-panel">
        <div class="bombo-card" id="card-b1">
          <div class="bombo-header">BOMBO 1 (PRIMEROS)</div>
          <div id="bombo1"></div>
        </div>
        <div class="bombo-card" id="card-b2">
          <div class="bombo-header">BOMBO 2 (SEGUNDOS)</div>
          <div id="bombo2"></div>
        </div>
      </div>
    </aside>

    <section class="bracket-grid">
      <div id="slot-OF1" class="slot"></div>
      <div id="slot-OF2" class="slot"></div>
      <div id="slot-OF3" class="slot"></div>
      <div id="slot-OF4" class="slot"></div>
      <div id="slot-OF5" class="slot"></div>
      <div id="slot-OF6" class="slot"></div>
      <div id="slot-OF7" class="slot"></div>
      <div id="slot-OF8" class="slot"></div>
    </section>
  </div>
</main>

<script>
let poolPartidos = [];
let etapa = "B1"; 
let actualMatch = null;
let slotsLibres = [];

async function init() {
  const resp = await fetch('torneos/1v1_copa_uruguaya_2026.json');
  const data = await resp.json();
  poolPartidos = data.eliminatorias.octavos;
  
  slotsLibres = poolPartidos.map(p => p.partidoId).sort(() => Math.random() - 0.5);

  const b1Names = poolPartidos.map(m => ({ id: m.jugador1Id, nick: m.jugador1Nick })).sort(() => Math.random() - 0.5);
  const b2Names = poolPartidos.map(m => ({ id: m.jugador2Id, nick: m.jugador2Nick })).sort(() => Math.random() - 0.5);

  b1Names.forEach(p => document.getElementById('bombo1').innerHTML += `<div class="bolilla" id="t1-${p.id}">${p.nick}</div>`);
  b2Names.forEach(p => document.getElementById('bombo2').innerHTML += `<div class="bolilla" id="t2-${p.id}">${p.nick}</div>`);
}

function animarRuleta(bomboId, targetId, callback) {
  const bolillas = document.querySelectorAll(`#${bomboId} .bolilla:not(.used)`);
  let i = 0;
  const timer = setInterval(() => {
    bolillas.forEach(b => b.classList.remove('active'));
    bolillas[Math.floor(Math.random() * bolillas.length)].classList.add('active');
    if (i++ > 15) {
      clearInterval(timer);
      bolillas.forEach(b => b.classList.remove('active'));
      document.getElementById(targetId).classList.add('active');
      callback();
    }
  }, 60);
}

function procesarSorteo() {
  const btn = document.getElementById('btnAction');
  btn.disabled = true;

  if (etapa === "B1") {
    actualMatch = poolPartidos.splice(Math.floor(Math.random() * poolPartidos.length), 1)[0];
    document.getElementById('card-b1').classList.add('activo');
    
    animarRuleta("bombo1", `t1-${actualMatch.jugador1Id}`, () => {
      btn.disabled = false;
      btn.innerText = `Sortear Rival para ${actualMatch.jugador1Nick}`;
      etapa = "B2";
    });
  } else {
    document.getElementById('card-b2').classList.add('activo');
    animarRuleta("bombo2", `t2-${actualMatch.jugador2Id}`, () => {
      document.getElementById(`t1-${actualMatch.jugador1Id}`).classList.replace('active', 'used');
      document.getElementById(`t2-${actualMatch.jugador2Id}`).classList.add('used');
      document.querySelectorAll('.bombo-card').forEach(c => c.classList.remove('activo'));

      const slotId = slotsLibres.shift();
      document.getElementById(`slot-${slotId}`).innerHTML = `
        <div class="match-card">
          <div class="nick">${actualMatch.jugador1Nick}</div>
          <div class="vs">CONTRA</div>
          <div class="nick">${actualMatch.jugador2Nick}</div>
        </div>
      `;

      btn.disabled = false;
      if (poolPartidos.length === 0) {
        btn.innerText = "SORTEO FINALIZADO";
        btn.disabled = true;
      } else {
        btn.innerText = "Siguiente Cabeza de Serie";
        etapa = "B1";
      }
    });
  }
}

init();
</script>
</body>
</html>
