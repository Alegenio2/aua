<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Civs Overlay — Copa Uruguaya 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Fondo transparente para OBS */
    body {
        background: transparent;
        font-family: 'Inter', sans-serif;
        padding: 16px;
    }

    /* ── Variables ── */
    :root {
        --gold:    #e8c87a;
        --gold2:   #c8a040;
        --bg:      rgba(10,6,2,0.92);
        --bg2:     rgba(20,12,4,0.95);
        --border:  rgba(232,200,122,0.2);
        --host:    #6aaae8;
        --guest:   #e86a8a;
        --win:     #a8c860;
        --ban-red: rgba(180,40,40,0.6);
        --text:    #e8e0d0;
        --muted:   #a09070;
        --dim:     #665544;
    }

    @keyframes fadeIn    { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes banSlash  { from{width:0} to{width:100%} }
    @keyframes shimmer   { 0%,100%{opacity:.85} 50%{opacity:1} }

    /* ── Contenedor principal ── */
    .civs-overlay {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 860px;
        animation: fadeIn 0.5s ease both;
    }

    /* ── Header del overlay ── */
    .overlay-header {
        background: var(--bg);
        border: 0.5px solid var(--border);
        border-radius: 8px 8px 0 0;
        padding: 8px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(232,200,122,0.3);
    }
    .overlay-title {
        font-family: 'Cinzel', serif;
        font-size: 11px;
        color: var(--gold2);
        letter-spacing: 3px;
        text-transform: uppercase;
        animation: shimmer 3s infinite;
    }
    .overlay-players {
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 13px;
    }
    .overlay-host  { color: var(--host);  font-weight: 600; }
    .overlay-guest { color: var(--guest); font-weight: 600; }
    .overlay-vs    { color: var(--dim); font-size: 11px; letter-spacing: 2px; }

    /* ── Secciones picks/bans ── */
    .section-block {
        background: var(--bg);
        border: 0.5px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        animation: fadeIn 0.5s ease both;
    }
    .section-label {
        font-size: 9px;
        color: var(--dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 10px;
    }
    .section-label.host  { color: var(--host); }
    .section-label.guest { color: var(--guest); }
    .section-label.neutral { color: var(--gold2); }

    /* ── Grid de civs ── */
    .civ-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    /* ── Tarjeta circular ── */
    .civ-card {
        position: relative;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 2px solid rgba(232,200,122,0.2);
        background: var(--bg2);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: transform 0.2s, border-color 0.2s;
        flex-shrink: 0;
    }
    .civ-card:hover { transform: scale(1.06); }

    .civ-img {
        width: 66px;
        height: 66px;
        object-fit: cover;
        border-radius: 50%;
    }

    .civ-name {
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        background: rgba(8,5,2,0.82);
        padding: 1px 5px;
        border-radius: 3px;
        letter-spacing: 0.3px;
    }

    /* ── Estados ── */

    /* Pick host */
    .civ-pick-host {
        border-color: var(--host) !important;
        box-shadow: 0 0 10px rgba(106,170,232,0.25);
    }

    /* Pick guest */
    .civ-pick-guest {
        border-color: var(--guest) !important;
        box-shadow: 0 0 10px rgba(232,106,138,0.25);
    }

    /* Ban — gris + tachado */
    .civ-ban {
        border-color: rgba(120,40,40,0.6) !important;
    }
    .civ-ban .civ-img {
        filter: grayscale(90%) brightness(0.5);
    }
    .civ-ban .civ-name {
        color: #886666;
        text-decoration: line-through;
    }
    /* Cruz de ban encima */
    .civ-ban::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%,-50%) rotate(45deg);
        width: 2px;
        height: 70%;
        background: rgba(200,60,60,0.7);
        border-radius: 2px;
        pointer-events: none;
        box-shadow: 0 0 6px rgba(200,60,60,0.4);
    }

    /* Ganador */
    .civ-won {
        border-color: var(--win) !important;
        box-shadow: 0 0 12px rgba(168,200,96,0.35);
    }
    .civ-won .civ-img { filter: brightness(1.1); }

    /* Imagen de estado (gano/perdio) */
    .status-image {
        position: absolute;
        top: 4px;
        left: 50%;
        transform: translateX(-50%);
        width: 22px;
        height: 22px;
        z-index: 2;
        filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8));
    }

    /* ── Layout 3 columnas (host | neutral | guest) ── */
    .civs-layout {
        display: grid;
        grid-template-columns: 1fr 1.3fr 1fr;
        gap: 10px;
    }

    /* ── Firma ── */
    .firma {
        text-align: right;
        font-size: 9px;
        color: rgba(100,80,50,0.4);
        letter-spacing: 1px;
        padding-top: 4px;
        padding-right: 4px;
    }
    </style>
</head>
<body>

<div class="civs-overlay" id="civsOverlay">

    <!-- Header -->
    <div class="overlay-header">
        <div class="overlay-title">⚔ Copa Uruguaya 2026 — Draft de Civs</div>
        <div class="overlay-players">
            <span class="overlay-host" id="headerHost">Host</span>
            <span class="overlay-vs">VS</span>
            <span class="overlay-guest" id="headerGuest">Guest</span>
        </div>
    </div>

    <!-- 3 columnas -->
    <div class="civs-layout">

        <!-- HOST -->
        <div>
            <div class="section-block">
                <div class="section-label host">Host Picks</div>
                <div class="civ-container" id="neutralCivsContainer-host-picks"></div>
            </div>
            <div class="section-block" style="margin-top:8px">
                <div class="section-label host">Host Bans</div>
                <div class="civ-container" id="neutralCivsContainer-host-bans"></div>
            </div>
        </div>

        <!-- NEUTRAL -->
        <div>
            <div class="section-block">
                <div class="section-label neutral">Civs Disponibles</div>
                <div class="civ-container" id="neutralCivsContainer"></div>
            </div>
        </div>

        <!-- GUEST -->
        <div>
            <div class="section-block">
                <div class="section-label guest">Guest Picks</div>
                <div class="civ-container" id="neutralCivsContainer-guest-picks"></div>
            </div>
            <div class="section-block" style="margin-top:8px">
                <div class="section-label guest">Guest Bans</div>
                <div class="civ-container" id="neutralCivsContainer-guest-bans"></div>
            </div>
        </div>

    </div>

    <div class="firma">Diseñado por JabsUY · AUA 2026</div>
</div>

<script>
    // Escuchar cambios en localStorage (desde admindraft.html en la misma origin)
    window.addEventListener("storage", (event) => {
        if (event.key === "neutralCivs" || event.key === "civsData") {
            renderNeutralCivs();
        }
    });

    async function fetchCivilizationDetails() {
        const cached = localStorage.getItem("civilizations");
        if (cached) return JSON.parse(cached);
        try {
            const res  = await fetch("https://raw.githubusercontent.com/Alegenio2/civs/refs/heads/main/civs.json");
            const data = await res.json();
            localStorage.setItem("civilizations", JSON.stringify(data));
            return data;
        } catch (e) {
            console.error("Error cargando civs:", e);
            return [];
        }
    }

    async function renderNeutralCivs() {
        const civs       = JSON.parse(localStorage.getItem("neutralCivs") || "[]");
        const civsData   = JSON.parse(localStorage.getItem("civsData")    || "{}");
        const civDetails = await fetchCivilizationDetails();

        // Actualizar nombres en header
        if (civsData.hostName)  document.getElementById("headerHost").textContent  = civsData.hostName;
        if (civsData.guestName) document.getElementById("headerGuest").textContent = civsData.guestName;

        // Limpiar contenedores
        const containers = {
            'neutral':     document.getElementById("neutralCivsContainer"),
            'host-picks':  document.getElementById("neutralCivsContainer-host-picks"),
            'host-bans':   document.getElementById("neutralCivsContainer-host-bans"),
            'guest-picks': document.getElementById("neutralCivsContainer-guest-picks"),
            'guest-bans':  document.getElementById("neutralCivsContainer-guest-bans"),
        };
        Object.values(containers).forEach(c => { if(c) c.innerHTML = ''; });

        civs.forEach(civ => {
            const detail = civDetails.find(d => d.id === civ.name);
            if (!detail) return;

            const el = document.createElement("div");

            // Determinar clase y contenedor destino
            let containerKey = 'neutral';
            let cardClass    = '';

            if (civ.actionType === 'pick') {
                if (civ.player === 'host') {
                    cardClass    = 'civ-pick-host';
                    containerKey = 'host-picks';
                } else {
                    cardClass    = 'civ-pick-guest';
                    containerKey = 'guest-picks';
                }
            } else if (civ.actionType === 'ban' || civ.actionType === 'snipe') {
                cardClass    = 'civ-ban';
                containerKey = civ.player === 'host' ? 'host-bans' : 'guest-bans';
            }

            el.className = `civ-card ${cardClass}`;
            el.setAttribute("data-civ-id", civ.name);

            const img      = document.createElement("img");
            img.className  = "civ-img";
            img.src        = detail.imagen;
            img.alt        = detail.nombre;

            const name     = document.createElement("div");
            name.className = "civ-name";
            name.textContent = detail.nombre;

            if (civ.won) {
                const wonImg   = document.createElement("img");
                wonImg.src     = "img/gano.svg";
                wonImg.alt     = "Ganador";
                wonImg.className = "status-image";
                el.appendChild(wonImg);
                el.classList.add("civ-won");
            }
            if (civ.lost) {
                const lostImg   = document.createElement("img");
                lostImg.src     = "img/perdio.svg";
                lostImg.alt     = "Perdedor";
                lostImg.className = "status-image";
                el.appendChild(lostImg);
            }

            el.appendChild(img);
            el.appendChild(name);

            const target = containers[containerKey] || containers['neutral'];
            target.appendChild(el);
        });
    }

    document.addEventListener("DOMContentLoaded", renderNeutralCivs);
</script>
</body>
</html>
