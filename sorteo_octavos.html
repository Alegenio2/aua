<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Sorteo Octavos | Copa Uruguaya 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #e8c87a; --gold2: #c8a040; --bg0: #0d0d0d; --bg1: #131008;
  --text: #e8e0d0; --border: rgba(232,200,122,0.15);
}

body {
  background: var(--bg0); color: var(--text);
  font-family: 'Open Sans', sans-serif; margin: 0; padding: 20px;
  display: flex; flex-direction: column; align-items: center;
}

.header h1 {
  font-family: 'Cinzel', serif; color: var(--gold);
  text-align: center; letter-spacing: 4px; text-transform: uppercase;
  text-shadow: 0 0 15px rgba(232,200,122,0.3);
}

.main-container {
  display: flex; gap: 20px; width: 100%; max-width: 1200px; justify-content: center;
}

.bombo-card {
  flex: 1; background: var(--bg1); border: 1px solid var(--border);
  border-radius: 8px; padding: 15px; position: relative;
}

.bombo-card h2 {
  font-family: 'Cinzel'; font-size: 16px; color: var(--gold);
  text-align: center; border-bottom: 1px solid var(--border);
  padding-bottom: 10px; margin-bottom: 15px;
}

.player-tag {
  padding: 8px 12px; margin: 5px 0; background: rgba(255,255,255,0.03);
  border-radius: 4px; font-size: 14px; transition: all 0.3s;
  border-left: 3px solid transparent;
}

.player-tag.active {
  background: var(--gold); color: var(--bg0); font-weight: bold;
  transform: translateX(5px); box-shadow: 0 0 15px var(--gold2);
}

.player-tag.used { opacity: 0.1; filter: grayscale(1); transform: scale(0.95); }

.controls { margin: 30px 0; }

.btn-sortear {
  background: linear-gradient(to bottom, var(--gold), var(--gold2));
  color: var(--bg0); border: none; padding: 15px 50px;
  font-family: 'Cinzel'; font-weight: 900; cursor: pointer;
  border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  transition: 0.3s;
}

.btn-sortear:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
.btn-sortear:disabled { background: #333; color: #666; cursor: not-allowed; }

.bracket-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 15px; width: 100%; max-width: 1200px; margin-top: 20px;
}

.slot {
  height: 120px; border: 1px dashed var(--border);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
}

.match-card {
  width: 100%; height: 100%; background: var(--bg2);
  border: 1px solid var(--gold2); border-radius: 6px;
  display: flex; flex-direction: column; justify-content: center;
  align-items: center; animation: revealMatch 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  background-image: linear-gradient(45deg, rgba(232,200,122,0.05) 0%, transparent 70%);
}

@keyframes revealMatch {
  from { opacity: 0; transform: translateY(20px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.vs-divider { font-family: 'Cinzel'; color: var(--gold); font-size: 12px; margin: 5px 0; }
.nick { font-weight: 700; font-size: 16px; }

</style>
</head>
<body>

<div class="header">
  <h1>Copa Uruguaya 2026</h1>
  <p style="color: var(--gold2); text-align: center; letter-spacing: 2px;">SORTEO DE FASES FINALES</p>
</div>

<div class="main-container">
  <div class="bombo-card">
    <h2><i class="fas fa-crown"></i> BOMBO 1 (PRIMEROS)</h2>
    <div id="bombo1"></div>
  </div>
  
  <div class="bombo-card">
    <h2><i class="fas fa-shield-alt"></i> BOMBO 2 (SEGUNDOS)</h2>
    <div id="bombo2"></div>
  </div>
</div>

<div class="controls">
  <button class="btn-sortear" id="btnAction" onclick="procesarSorteo()">Revelar Cabeza de Serie</button>
</div>

<div class="bracket-grid">
  <div id="slot-OF1" class="slot"></div>
  <div id="slot-OF2" class="slot"></div>
  <div id="slot-OF3" class="slot"></div>
  <div id="slot-OF4" class="slot"></div>
  <div id="slot-OF5" class="slot"></div>
  <div id="slot-OF6" class="slot"></div>
  <div id="slot-OF7" class="slot"></div>
  <div id="slot-OF8" class="slot"></div>
</div>

<script>
let poolPartidos = [];
let etapa = "B1"; 
let actualMatch = null;
let slotsDisponibles = [];

async function init() {
  const resp = await fetch('torneos/1v1_copa_uruguaya_2026.json');
  const data = await resp.json();
  poolPartidos = data.eliminatorias.octavos;

  // Mezclar visualmente los slots del grid
  slotsDisponibles = poolPartidos.map(p => p.partidoId).sort(() => Math.random() - 0.5);

  // Mezclar visualmente los bombos
  const b1Names = poolPartidos.map(m => ({ id: m.jugador1Id, nick: m.jugador1Nick })).sort(() => Math.random() - 0.5);
  const b2Names = poolPartidos.map(m => ({ id: m.jugador2Id, nick: m.jugador2Nick })).sort(() => Math.random() - 0.5);

  const b1Div = document.getElementById('bombo1');
  const b2Div = document.getElementById('bombo2');

  b1Names.forEach(p => b1Div.innerHTML += `<div class="player-tag" id="t1-${p.id}">${p.nick}</div>`);
  b2Names.forEach(p => b2Div.innerHTML += `<div class="player-tag" id="t2-${p.id}">${p.nick}</div>`);
}

function ruleta(containerId, targetId, callback) {
  const tags = document.querySelectorAll(`#${containerId} .player-tag:not(.used)`);
  let i = 0;
  const interval = setInterval(() => {
    tags.forEach(t => t.classList.remove('active'));
    tags[Math.floor(Math.random() * tags.length)].classList.add('active');
    i++;
    if (i > 12) {
      clearInterval(interval);
      tags.forEach(t => t.classList.remove('active'));
      document.getElementById(targetId).classList.add('active');
      callback();
    }
  }, 70);
}

function procesarSorteo() {
  const btn = document.getElementById('btnAction');
  btn.disabled = true;

  if (etapa === "B1") {
    const idx = Math.floor(Math.random() * poolPartidos.length);
    actualMatch = poolPartidos.splice(idx, 1)[0];

    ruleta("bombo1", `t1-${actualMatch.jugador1Id}`, () => {
      btn.disabled = false;
      btn.innerText = `Sortear Rival para ${actualMatch.jugador1Nick}`;
      etapa = "B2";
    });
  } 
  else {
    ruleta("bombo2", `t2-${actualMatch.jugador2Id}`, () => {
      const t1 = document.getElementById(`t1-${actualMatch.jugador1Id}`);
      const t2 = document.getElementById(`t2-${actualMatch.jugador2Id}`);
      
      t1.classList.replace('active', 'used');
      t2.classList.add('used');

      const slotId = slotsDisponibles.shift();
      document.getElementById(`slot-${slotId}`).innerHTML = `
        <div class="match-card">
          <div style="font-size:9px; color:var(--gold2)">MATCH ${slotId}</div>
          <div class="nick">${actualMatch.jugador1Nick}</div>
          <div class="vs-divider">VS</div>
          <div class="nick">${actualMatch.jugador2Nick}</div>
        </div>
      `;

      btn.disabled = false;
      if (poolPartidos.length === 0) {
        btn.innerText = "SORTEO FINALIZADO";
        btn.disabled = true;
      } else {
        btn.innerText = "Siguiente Cabeza de Serie";
        etapa = "B1";
      }
    });
  }
}

init();
</script>
</body>
</html>
