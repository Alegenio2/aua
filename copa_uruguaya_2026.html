<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Copa Uruguaya 2026 — AUA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
/* ══════════════════════════════════════════════════════════
   COPA URUGUAYA 2026 — AUA
   Estilo: medieval oscuro con dorado uruguayo
══════════════════════════════════════════════════════════ */
:root {
  --gold:       #e8c87a;
  --gold2:      #c8a040;
  --gold-light: #f5d98a;
  --gold-dim:   rgba(232,200,122,0.12);
  --celeste:    #5bb8d4;
  --bg0:        #080604;
  --bg1:        #0f0b06;
  --bg2:        #161008;
  --bg3:        #1e160a;
  --brown:      #3a2a1a;
  --brown2:     #2a1a0a;
  --text:       #e8e0d0;
  --muted:      #a09070;
  --dim:        #665544;
  --host:       #6aaae8;
  --guest:      #e86a8a;
  --win:        #a8c860;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg0);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,200,122,0.06) 0%, transparent 60%),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(232,200,122,0.01) 40px,rgba(232,200,122,0.01) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(232,200,122,0.01) 40px,rgba(232,200,122,0.01) 41px);
  pointer-events:none;z-index:0;
}

header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,6,4,0.97);
  border-bottom:0.5px solid rgba(232,200,122,0.15);
  backdrop-filter:blur(12px);
  padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  height:60px;
}
.header-logo{
  display:flex;align-items:center;gap:12px;text-decoration:none;
}
.header-logo .logo-icon{
  font-size:22px;color:var(--gold);
  text-shadow:0 0 20px rgba(232,200,122,0.4);
}
.header-logo .logo-text{
  font-family:'Cinzel',serif;font-size:13px;color:var(--gold);
  letter-spacing:3px;text-transform:uppercase;
}
nav{display:flex;align-items:center;gap:4px}
nav a{
  font-size:12px;color:var(--muted);letter-spacing:1px;
  padding:6px 14px;border-radius:6px;text-decoration:none;
  transition:all 0.18s;text-transform:uppercase;
}
nav a:hover{color:var(--gold);background:var(--gold-dim)}
nav a.active{color:var(--gold);background:var(--gold-dim)}

.hero{
  position:relative;
  padding:80px 32px 60px;
  text-align:center;
}
.hero-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(28px,5vw,56px);
  color:var(--text);
  letter-spacing:2px;
  line-height:1.1;
  margin-bottom:6px;
}
.hero-title span{
  color:var(--gold);
  text-shadow:0 0 40px rgba(232,200,122,0.3);
}
.hero-sub{
  font-family:'Cinzel',serif;
  font-size:14px;color:var(--dim);
  letter-spacing:4px;text-transform:uppercase;
}

.section{
  position:relative;z-index:1;
  max-width:1280px;margin:0 auto;
  padding:0 24px 60px;
}
.section-header{
  display:flex;align-items:center;gap:14px;margin-bottom:28px;
}
.section-title{
  font-family:'Cinzel',serif;font-size:16px;
  color:var(--gold);letter-spacing:2px;text-transform:uppercase;
}
.section-line{
  flex:1;height:0.5px;
  background:linear-gradient(to right,rgba(232,200,122,0.2),transparent);
}

.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}
.tab-btn{
  padding:8px 18px;border-radius:6px;
  font-size:12px;font-weight:500;letter-spacing:1px;
  cursor:pointer;transition:all 0.18s;
  background:var(--bg2);border:0.5px solid var(--brown);
  color:var(--dim);font-family:'Inter',sans-serif;
  text-transform:uppercase;
}
.tab-btn.active{
  background:var(--gold-dim);border-color:rgba(232,200,122,0.4);
  color:var(--gold);
}

.grupos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}
.grupo-card{
  background:var(--bg2);
  border:0.5px solid var(--brown);
  border-radius:10px;
  overflow:hidden;
}
.grupo-card-header{
  padding:12px 16px;
  background:var(--bg3);
  border-bottom:0.5px solid var(--brown);
  font-family:'Cinzel',serif;font-size:13px;
  color:var(--gold);letter-spacing:2px;
}

.tabla-pos{width:100%;border-collapse:collapse}
.tabla-pos th{
  font-size:8px;letter-spacing:1.5px;color:var(--dim);
  text-transform:uppercase;padding:8px 10px;
  border-bottom:0.5px solid var(--brown);
}
.tabla-pos td{
  padding:9px 10px;font-size:13px;
  border-bottom:0.5px solid rgba(58,42,26,0.5);
  text-align:center;
}
.tabla-pos td:first-child{text-align:left}
.pos-num{font-family:'Cinzel',serif;font-size:12px;color:var(--dim);margin-right:6px;}
.pts-cell{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);}

/* CRUCES - ESTILO DINÁMICO */
.fase-divider {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--gold2);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin: 40px 0 20px;
  display: flex;
  align-items: center;
  gap: 15px;
}
.fase-divider::after { content: ''; flex: 1; height: 0.5px; background: var(--brown); }

.cruces-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}
.cruce-card{
  background:var(--bg3);
  border:0.5px solid var(--brown);
  border-radius:8px;
  padding:14px 16px;
}
.cruce-id{font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;}
.cruce-j{display:flex;align-items:center;justify-content:space-between;padding:7px 0;}
.cruce-j:first-of-type{border-bottom:0.5px solid var(--brown)}
.cruce-nick{font-size:13px;color:var(--text)}
.cruce-nick.tbd{color:var(--dim);font-style:italic}
.cruce-score{font-family:'Cinzel',serif;font-weight:700;color:var(--gold)}
.cruce-vs{display:flex;align-items:center;justify-content:center;padding:4px 0;font-size:9px;color:var(--dim);letter-spacing:3px;}

.loading{text-align:center;padding:40px;font-size:12px;color:var(--dim);letter-spacing:2px;}
</style>
</head>
<body>

<header>
  <a href="#" class="header-logo">
    <span class="logo-icon">⚔</span>
    <span class="logo-text">AUA</span>
  </a>
  <nav>
    <a href="#grupos">Grupos</a>
    <a href="#cruces">Cruces</a>
    <a href="#mapas">Mapas</a>
  </nav>
</header>

<div class="hero">
  <h1 class="hero-title">Copa <span>Uruguaya</span></h1>
  <div class="hero-sub">Temporada 2026</div>
</div>

<section class="section" id="grupos">
  <div class="section-header">
    <div class="section-title">Grupos & Posiciones</div>
    <div class="section-line"></div>
  </div>
  <div class="tabs" id="grupos-tabs"></div>
  <div id="grupos-content" class="grupos-grid">
    <div class="loading">Cargando pergaminos...</div>
  </div>
</section>

<section class="section" id="cruces">
  <div class="section-header">
    <div class="section-title">Fase Eliminatoria</div>
    <div class="section-line"></div>
  </div>
  <div id="cruces-container">
    </div>
</section>

<script>
const TORNEO_URL = 'torneos/1v1_copa_uruguaya_2026.json';
let torneoDB = null;
let vistaGrupos = 'tabla';

const cleanNick = n => (n||'').replace(/[|\[\]]/g,'').trim();

async function fetchJSON(url) {
  const r = await fetch(url + '?t=' + Date.now());
  return r.json();
}

function calcularTabla(torneo, letraGrupo) {
  const grupo = torneo.grupos.find(g => g.nombre === `Grupo ${letraGrupo}`);
  if (!grupo) return [];
  const stats = {};
  grupo.jugadores.forEach(j => {
    stats[j.id] = { nick: j.nick, elo: j.elo, pj:0, pg:0, pp:0, sf:0, sc:0, pts:0 };
  });
  const rg = torneo.rondas_grupos.find(r => r.grupo === letraGrupo);
  if (rg) {
    rg.partidos.forEach(f => {
      f.partidos.forEach(p => {
        if (!p.resultado) return;
        const ids = Object.keys(p.resultado).filter(k => !['mapas','civs','recs_url','recs_local','evidencia','fecha_registro'].includes(k));
        const id1 = ids[0], id2 = ids[1];
        if (!stats[id1] || !stats[id2]) return;
        const s1 = p.resultado[id1], s2 = p.resultado[id2];
        stats[id1].pj++; stats[id2].pj++;
        stats[id1].sf += s1; stats[id1].sc += s2;
        stats[id2].sf += s2; stats[id2].sc += s1;
        if (s1 > s2) { stats[id1].pg++; stats[id1].pts += 2; if(s2===1) stats[id2].pts+=1; }
        else { stats[id2].pg++; stats[id2].pts += 2; if(s1===1) stats[id1].pts+=1; }
      });
    });
  }
  return Object.values(stats).sort((a,b) => (b.pts - a.pts) || ((b.sf-b.sc) - (a.sf-a.sc)));
}

function renderEliminatorias(eliminatorias) {
  const container = document.getElementById('cruces-container');
  if (!eliminatorias) return;

  const fases = [
    { id: 'octavos', label: 'Octavos de Final' },
    { id: 'cuartos', label: 'Cuartos de Final' },
    { id: 'semis',   label: 'Semifinales' },
    { id: 'final',   label: 'Gran Final' }
  ];

  container.innerHTML = fases.map(fase => {
    const lista = eliminatorias[fase.id];
    if (!lista || lista.length === 0) return '';

    const cards = lista.map(p => {
      const n1 = p.jugador1Nick ? cleanNick(p.jugador1Nick) : 'Por definir';
      const n2 = p.jugador2Nick ? cleanNick(p.jugador2Nick) : 'Por definir';
      const r1 = p.resultado ? p.resultado[p.jugador1Id] || 0 : '-';
      const r2 = p.resultado ? p.resultado[p.jugador2Id] || 0 : '-';

      return `
        <div class="cruce-card">
          <div class="cruce-id">${p.partidoId}</div>
          <div class="cruce-j">
            <span class="cruce-nick ${!p.jugador1Nick ? 'tbd' : ''}">${n1}</span>
            <span class="cruce-score">${r1}</span>
          </div>
          <div class="cruce-vs">VS</div>
          <div class="cruce-j">
            <span class="cruce-nick ${!p.jugador2Nick ? 'tbd' : ''}">${n2}</span>
            <span class="cruce-score">${r2}</span>
          </div>
        </div>`;
    }).join('');

    return `<div class="fase-divider">${fase.label}</div><div class="cruces-grid">${cards}</div>`;
  }).join('');
}

function renderGrupos(torneo) {
  const contentEl = document.getElementById('grupos-content');
  const letras = torneo.rondas_grupos.map(r => r.grupo);
  
  contentEl.innerHTML = letras.map(l => {
    const tabla = calcularTabla(torneo, l);
    const rows = tabla.map((j, i) => `
      <tr>
        <td><span class="pos-num">${i+1}.</span>${cleanNick(j.nick)}</td>
        <td>${j.pj}</td>
        <td class="pts-cell">${j.pts}</td>
      </tr>`).join('');

    return `
      <div class="grupo-card">
        <div class="grupo-card-header">Grupo ${l}</div>
        <table class="tabla-pos">
          <thead><tr><th>Jugador</th><th>PJ</th><th>PTS</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }).join('');
}

async function init() {
  try {
    torneoDB = await fetchJSON(TORNEO_URL);
    renderGrupos(torneoDB);
    renderEliminatorias(torneoDB.eliminatorias);
  } catch(e) { console.error(e); }
}

init();
</script>
</body>
</html>
